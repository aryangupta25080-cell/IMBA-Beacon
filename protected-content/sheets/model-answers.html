<style>
  :root{
    --primary:#692240;
    --accent:#AA3B5C;
    --bg:#fbf7f9;
    --ink:#1f2937;
    --muted:#6b7280;
    --card:#ffffff;
    --ring:rgba(105,34,64,0.18);
  }
  *{box-sizing:border-box}
  html{scroll-behavior:smooth}
  body{
    margin:0;
    background:var(--bg);
    color:var(--ink);
    font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Inter,Helvetica,Arial,"Apple Color Emoji","Segoe UI Emoji",sans-serif;
    -webkit-font-smoothing:antialiased;
    line-height:1.6;
  }
  .page{
    max-width:900px;
    margin:0 auto;
    padding:28px 20px 60px;
  }
  header{
    position:relative;
    background:linear-gradient(135deg,var(--primary) 0%, var(--accent) 100%);
    color:#fff;
    padding:36px 28px 32px;
    border-radius:18px;
    box-shadow:0 12px 34px var(--ring);
    overflow:hidden;
    isolation:isolate;
  }
  header::after{
    content:"";
    position:absolute; inset:-40% -20% auto auto;
    width:320px;height:320px;
    background:radial-gradient(closest-side, rgba(255,255,255,.18), transparent 70%);
    transform:rotate(25deg);
    pointer-events:none;
  }
  .brand{
    display:flex; align-items:flex-start; justify-content:space-between; gap:16px;
  }
  h1{
    margin:0;
    font-size:1.95rem;
    letter-spacing:-0.01em;
    font-weight:800;
  }
  .subtitle{
    margin:8px 0 0;
    font-size:1.02rem;
    opacity:.95;
  }
  .print-btn{
    flex-shrink:0;
    background:#fff;
    color:var(--primary);
    border:0;
    padding:10px 16px;
    border-radius:999px;
    font-weight:700;
    cursor:pointer;
    box-shadow:0 6px 16px rgba(0,0,0,.14);
    transition:transform .15s ease, box-shadow .15s ease, background .15s;
  }
  .print-btn:hover{transform:translateY(-1px); box-shadow:0 8px 20px rgba(0,0,0,.18)}
  .print-btn:active{transform:translateY(0)}
  .print-btn svg{vertical-align:-3px; margin-right:6px}

  .toc{
    background:var(--card);
    border-radius:14px;
    padding:20px 22px;
    margin:22px 0 26px;
    border-left:4px solid var(--accent);
    box-shadow:0 4px 14px rgba(16,24,40,.06);
  }
  .toc h2{
    margin:0 0 10px;
    font-size:.95rem;
    text-transform:uppercase;
    letter-spacing:.08em;
    color:var(--primary);
    font-weight:800;
  }
  .toc p.desc{
    margin:0 0 12px;
    color:var(--muted);
    font-size:.95rem;
  }
  #toc-list{
    margin:0;
    padding-left:18px;
    columns:1;
  }
  #toc-list li{
    margin:6px 0;
    break-inside:avoid;
  }
  #toc-list a{
    color:#334155;
    text-decoration:none;
    border-bottom:1px dotted rgba(105,34,64,.35);
    transition:color .15s, border-color .15s;
  }
  #toc-list a:hover{
    color:var(--primary);
    border-bottom-color:var(--primary);
  }

  main#content{min-height:200px}

  .card{
    background:var(--card);
    border-left:4px solid var(--primary);
    padding:24px;
    margin-bottom:18px;
    border-radius:12px;
    box-shadow:0 3px 10px rgba(16,24,40,.06);
    transition:transform .18s ease, box-shadow .18s ease;
  }
  .card:hover{transform:translateY(-1px); box-shadow:0 8px 22px rgba(16,24,40,.08)}
  .card h3{
    color:var(--primary);
    font-size:1.15rem;
    margin:0 0 10px;
    font-weight:750;
    line-height:1.4;
  }
  .card p{
    font-size:1rem;
    line-height:1.7;
    margin:0 0 10px;
    color:#374151;
  }
  .card p:last-child{margin-bottom:0}
  .card ul, .card ol{margin:.4rem 0 .8rem 1.2rem}
  .card li{margin:.3rem 0; line-height:1.6}

  .badge{
    display:inline-block;
    font-size:.72rem;
    letter-spacing:.04em;
    text-transform:uppercase;
    background:rgba(170,59,92,.1);
    color:var(--primary);
    padding:4px 8px;
    border-radius:6px;
    font-weight:700;
    margin-bottom:8px;
  }

  footer{
    text-align:center;
    margin:36px 0 10px;
    color:var(--muted);
    font-size:.9rem;
  }

  .loading{
    color:var(--muted);
    text-align:center;
    padding:30px;
    font-style:italic;
  }

  @media (min-width:780px){
    #toc-list{columns:2; column-gap:32px}
  }
  @media (max-width:640px){
    .page{padding:18px 14px 50px}
    header{padding:26px 18px 22px; border-radius:14px}
    h1{font-size:1.5rem}
    .brand{flex-direction:column; align-items:flex-start}
    .print-btn{width:100%; margin-top:12px}
    .card{padding:18px; border-radius:10px}
    .toc{padding:16px 16px}
  }

  @media print{
    :root{--primary:#5a1d37}
    body{background:#fff}
    .page{max-width:100%; padding:0 0}
    header{
      background:#fff !important; color:#000;
      box-shadow:none; border-radius:0; padding:0 0 12px; margin-bottom:12px;
      border-bottom:3px solid var(--primary);
    }
    header::after{display:none}
    .print-btn{display:none !important}
    .toc{
      box-shadow:none; border:1px solid #e5e7eb; border-left:4px solid var(--accent);
      page-break-inside:avoid;
    }
    .card{
      box-shadow:none; border:1px solid #e5e7eb; border-left:4px solid var(--primary);
      page-break-inside:avoid; margin-bottom:14px;
    }
    a{color:inherit; text-decoration:none; border-bottom:0}
    footer{margin-top:20px}
  }
</style>
</head>

<script>
  document.getElementById('printBtn').addEventListener('click', () => window.print());

  function slugify(text){
    return text.toLowerCase()
      .replace(/[^a-z0-9\s-]/g,'')
      .trim()
      .replace(/\s+/g,'-')
      .replace(/-+/g,'-')
      .slice(0,80);
  }

  async function loadContent(){
    const srcEl = document.getElementById('sourceFile');
    const container = document.getElementById('content');
    try{
      const url = srcEl.href;
      const res = await fetch(url, {cache:'no-store'});
      if(!res.ok) throw new Error('Failed to load');
      const html = await res.text();

      // Inject the provided cards exactly as given
      container.innerHTML = html;

      const cards = container.querySelectorAll('.card');
      const toc = document.getElementById('toc-list');
      const seen = {};

      cards.forEach((card, idx) => {
        // Find question heading
        const heading = card.querySelector('h3, h2, h1, strong');
        const qText = heading ? heading.textContent.trim() : `Question ${idx+1}`;

        let base = slugify(qText) || `question-${idx+1}`;
        let slug = base;
        let n = 1;
        while(seen[slug]){ slug = `${base}-${++n}`; }
        seen[slug] = true;

        card.id = slug;
        card.setAttribute('tabindex','-1');

        // Add a small badge for visual hierarchy (does not modify Q/A text)
        if(heading && heading.tagName.toLowerCase() === 'h3'){
          const badge = document.createElement('div');
          badge.className = 'badge';
          badge.textContent = `Q${idx+1}`;
          card.insertBefore(badge, heading);
        }

        // Build ToC entry
        const li = document.createElement('li');
        const a = document.createElement('a');
        a.href = `#${slug}`;
        a.textContent = qText;
        a.addEventListener('click', (e) => {
          // smooth focus for accessibility
          setTimeout(()=> {
            document.getElementById(slug)?.focus({preventScroll:true});
          }, 300);
        });
        li.appendChild(a);
        toc.appendChild(li);
      });

      if(cards.length === 0){
        container.innerHTML = '<p style="color:#6b7280">No questions found in the source file.</p>';
      }
    }catch(err){
      console.error(err);
      container.innerHTML = '<p style="color:#b91c1c; padding:20px; background:#fef2f2; border-left:4px solid #b91c1c; border-radius:8px">Unable to load interview content. Please ensure the source file is available.</p>';
    }
  }

  document.addEventListener('DOMContentLoaded', loadContent);
</script>
</body>
</html>
