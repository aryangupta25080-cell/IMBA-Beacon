<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Practice Quizzes | IMBA Beacon</title>
<script src="./site-config.js"></script>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
<link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800&family=Merriweather:wght@700&display=swap" rel="stylesheet"/>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@latest/tabler-icons.min.css"/>
<style>
:root{
  --bg:#FAFAF6;
  --surface:#fffdf9;
  --surface-soft:#f7f1e8;
  --ink:#40252f;
  --ink-soft:#866f76;
  --maroon:#6a1f36;
  --maroon-deep:#4f1629;
  --gold:#E8923A;
  --gold-soft:#f6d8ad;
  --border:#eadfd2;
  --shadow:0 18px 46px rgba(55,28,37,.10);
}
*{box-sizing:border-box}
body{
  margin:0;
  min-height:100vh;
  font-family:"Manrope",system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;
  color:var(--ink);
  background:
    radial-gradient(circle at 10% 8%,rgba(232,146,58,.18),transparent 28rem),
    radial-gradient(circle at 88% 2%,rgba(106,31,54,.14),transparent 30rem),
    linear-gradient(180deg,#fffdf8 0%,#f5eee5 100%);
}
a{color:inherit;text-decoration:none}
.page-shell{
  width:min(1180px,calc(100% - 32px));
  margin:0 auto;
  padding:2rem 0 4rem;
}
.topbar{
  display:flex;
  align-items:center;
  justify-content:space-between;
  gap:1rem;
  margin-bottom:1.2rem;
}
.brand{
  display:flex;
  align-items:center;
  gap:.75rem;
  font-weight:900;
}
.brand-mark{
  width:44px;
  height:44px;
  display:grid;
  place-items:center;
  border-radius:15px;
  color:var(--maroon);
  background:linear-gradient(135deg,var(--gold-soft),var(--gold));
  box-shadow:0 12px 24px rgba(232,146,58,.22);
}
.back-link{
  display:inline-flex;
  align-items:center;
  gap:.45rem;
  padding:.82rem 1.05rem;
  border:1px solid var(--border);
  border-radius:15px;
  background:rgba(255,255,255,.82);
  font-weight:900;
  box-shadow:0 10px 26px rgba(55,28,37,.06);
}
.hero-card{
  overflow:hidden;
  border:1px solid rgba(106,31,54,.16);
  border-radius:30px;
  background:var(--surface);
  box-shadow:var(--shadow);
}
.hero-band{
  padding:2.35rem;
  color:#fff;
  background:
    radial-gradient(circle at 16% 20%,rgba(246,216,173,.30),transparent 21rem),
    linear-gradient(135deg,var(--maroon-deep),var(--maroon) 62%,#7a3a2a);
}
.eyebrow{
  display:inline-flex;
  align-items:center;
  gap:.4rem;
  padding:.42rem .72rem;
  border-radius:999px;
  border:1px solid rgba(255,255,255,.18);
  background:rgba(246,216,173,.18);
  color:var(--gold-soft);
  font-size:.76rem;
  font-weight:900;
  letter-spacing:.12em;
  text-transform:uppercase;
}
h1{
  margin:1rem 0 .65rem;
  font-family:"Merriweather",Georgia,serif;
  font-size:clamp(2.1rem,4vw,3.55rem);
  line-height:1.05;
}
.hero-band p{
  max-width:48rem;
  margin:0;
  color:rgba(255,255,255,.84);
  line-height:1.7;
}
.quiz-content{
  padding:1.2rem;
}
.quiz-status{
  min-height:1.4rem;
  margin:0 0 1rem;
  color:#2d7b52;
  font-weight:800;
}
.quiz-status.error{color:#bb4357}
.quiz-grid{
  display:grid;
  grid-template-columns:repeat(2,minmax(0,1fr));
  gap:1rem;
}
.quiz-card{
  display:grid;
  grid-template-columns:auto 1fr auto;
  align-items:center;
  gap:1rem;
  padding:1.05rem;
  border:1px solid var(--border);
  border-radius:22px;
  background:#fff;
  box-shadow:0 12px 30px rgba(55,28,37,.07);
  transition:transform .22s ease,box-shadow .22s ease,border-color .22s ease;
}
.quiz-card:hover{
  transform:translateY(-2px);
  border-color:rgba(106,31,54,.24);
  box-shadow:0 18px 38px rgba(55,28,37,.11);
}
.quiz-number{
  width:52px;
  height:52px;
  display:grid;
  place-items:center;
  border-radius:18px;
  color:var(--maroon);
  background:linear-gradient(135deg,#fff3df,var(--gold-soft));
  font-weight:900;
  box-shadow:0 12px 22px rgba(232,146,58,.15);
}
.quiz-copy strong{
  display:block;
  color:var(--maroon);
  font-size:1.04rem;
  line-height:1.28;
}
.quiz-copy span{
  display:block;
  margin-top:.22rem;
  color:var(--ink-soft);
  font-size:.9rem;
}
.quiz-progress{
  display:inline-flex;
  align-items:center;
  gap:.34rem;
  margin-top:.5rem;
  padding:.3rem .56rem;
  border-radius:999px;
  background:rgba(45,123,82,.1);
  color:#2d7b52;
  font-size:.78rem;
  font-weight:900;
}
.quiz-action{
  display:inline-flex;
  align-items:center;
  justify-content:center;
  gap:.42rem;
  min-width:104px;
  padding:.76rem .95rem;
  border-radius:15px;
  color:var(--maroon-deep);
  background:linear-gradient(135deg,var(--gold-soft),var(--gold));
  font-weight:900;
}
@media (max-width: 820px){
  .quiz-grid{grid-template-columns:1fr}
  .topbar{align-items:flex-start;flex-direction:column}
  .back-link{width:100%;justify-content:center}
}
@media (max-width: 560px){
  .page-shell{width:min(100% - 22px,1180px);padding-top:1rem}
  .hero-band{padding:1.45rem}
  .quiz-content{padding:.8rem}
  .quiz-card{
    grid-template-columns:1fr;
    align-items:start;
  }
  .quiz-action{width:100%}
}
</style>
</head>
<body>
<main class="page-shell">
  <nav class="topbar">
    <a class="brand" href="./student.html">
      <span class="brand-mark">IB</span>
      <span>IMBA Beacon<br/><small>Practice quizzes</small></span>
    </a>
    <a class="back-link" href="./student.html#section-quiz"><i class="ti ti-arrow-left"></i> Back to Dashboard</a>
  </nav>

  <section class="hero-card">
    <div class="hero-band">
      <span class="eyebrow"><i class="ti ti-help-square-rounded"></i> Quiz Library</span>
      <h1>Practice Quizzes</h1>
      <p>Revise important mathematics topics through focused quiz sets. Open any quiz below and continue your preparation in the same IMBA Beacon learning style.</p>
    </div>
    <div class="quiz-content">
      <p class="quiz-status" id="quiz-status" aria-live="polite"></p>
      <div class="quiz-grid" id="quiz-grid"></div>
    </div>
  </section>
</main>

<script>
(function () {
  const apiBase = (window.IMBA_SITE_CONFIG && window.IMBA_SITE_CONFIG.apiBaseUrl) || "";
  const SESSION_TOKEN_KEY = "imbaSessionToken";
  const quizzes = [
    { id: "quiz-1", title: "Sets, Relations & Functions", href: `${apiBase}/protected/quiz-1` },
    { id: "quiz-2", title: "Trigonometry & Inverse Trigonometry", href: `${apiBase}/protected/quiz-2` },
    { id: "quiz-3", title: "Quadratic & Complex Numbers", href: `${apiBase}/protected/quiz-3` },
    { id: "quiz-4", title: "Limits, Continuity & Differentiability", href: `${apiBase}/protected/quiz-4` },
    { id: "quiz-5", title: "Integration & Area", href: `${apiBase}/protected/quiz-5` },
    { id: "quiz-6", title: "Permutation Combination & Binomial", href: `${apiBase}/protected/quiz-6` },
    { id: "quiz-7", title: "Matrices & Determinants", href: `${apiBase}/protected/quiz-7` },
    { id: "quiz-8", title: "Probability", href: `${apiBase}/protected/quiz-8` }
  ];

  const statusNode = document.getElementById("quiz-status");
  const gridNode = document.getElementById("quiz-grid");
  let savedAttempts = [];

  function escapeHtml(value) {
    return String(value || "")
      .replace(/&/g, "&amp;")
      .replace(/</g, "&lt;")
      .replace(/>/g, "&gt;")
      .replace(/"/g, "&quot;")
      .replace(/'/g, "&#039;");
  }

  function renderQuizzes() {
    gridNode.innerHTML = quizzes.map(function (quiz, index) {
      const number = String(index + 1).padStart(2, "0");
      const attempts = savedAttempts.filter(function (attempt) {
        return attempt.quizId === quiz.id;
      });
      const progressText = attempts.length
        ? `${attempts.length}/2 sets completed · Best ${Math.max(...attempts.map((attempt) => attempt.percent || 0))}%`
        : "No saved attempt yet";
      return `
        <article class="quiz-card">
          <div class="quiz-number">${number}</div>
          <div class="quiz-copy">
            <strong>${escapeHtml(quiz.title)}</strong>
            <span>Quiz ${index + 1} · Mathematics practice</span>
            <em class="quiz-progress"><i class="ti ti-chart-bar"></i> ${escapeHtml(progressText)}</em>
          </div>
          <a class="quiz-action" href="${escapeHtml(quiz.href)}" target="_blank" rel="noopener noreferrer">
            Start <i class="ti ti-arrow-up-right"></i>
          </a>
        </article>
      `;
    }).join("");
  }

  function getAuthHeaders(extraHeaders = {}) {
    const sessionToken = localStorage.getItem(SESSION_TOKEN_KEY);
    return sessionToken
      ? { ...extraHeaders, Authorization: `Bearer ${sessionToken}` }
      : extraHeaders;
  }

  async function requireSession() {
    try {
      const response = await fetch(`${apiBase}/api/auth/session`, {
        credentials: "include",
        headers: getAuthHeaders()
      });
      if (!response.ok) {
        throw new Error("Session unavailable.");
      }
      const payload = await response.json();
      if (!payload || !payload.user) {
        window.location.href = `./login.html?next=${encodeURIComponent("./quizzes.html")}`;
        return;
      }
      await loadQuizProgress();
      statusNode.textContent = "Quizzes loaded successfully.";
    } catch (error) {
      statusNode.textContent = "Please log in again to view quizzes.";
      statusNode.classList.add("error");
      window.location.href = `./login.html?next=${encodeURIComponent("./quizzes.html")}`;
    }
  }

  async function loadQuizProgress() {
    const response = await fetch(`${apiBase}/api/quiz-attempts`, {
      credentials: "include",
      headers: getAuthHeaders()
    });
    if (!response.ok) {
      throw new Error("Unable to load saved quiz progress.");
    }
    const payload = await response.json();
    savedAttempts = Array.isArray(payload.attempts) ? payload.attempts : [];
    renderQuizzes();
  }

  renderQuizzes();
  requireSession();
})();
</script>
</body>
</html>
