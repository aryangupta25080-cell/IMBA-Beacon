<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Articles | IMBA Beacon</title>
<script src="./site-config.js"></script>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
<link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800&family=Merriweather:wght@700&display=swap" rel="stylesheet"/>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@latest/tabler-icons.min.css"/>
<style>
:root{
  --bg:#FAFAF6;
  --surface:#fffdf9;
  --surface-soft:#f7f1e8;
  --surface-muted:#f1ebe2;
  --sidebar:#3f2331;
  --sidebar-deep:#2c1620;
  --sidebar-line:rgba(255,255,255,.10);
  --ink:#40252f;
  --ink-soft:#866f76;
  --maroon:#6a1f36;
  --maroon-deep:#4f1629;
  --amber:#E8923A;
  --amber-soft:#f6d8ad;
  --border:#eadfd2;
  --shadow:0 16px 38px rgba(55,28,37,.08);
  --radius-xl:28px;
  --radius-lg:20px;
}
*{
  box-sizing:border-box;
}
html{
  height:100%;
}
body{
  margin:0;
  min-height:100vh;
  font-family:"Manrope",system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;
  background:linear-gradient(180deg,#fcfbf7 0%,#f4efe7 100%);
  color:var(--ink);
}
a{
  color:inherit;
  text-decoration:none;
}
button{
  font:inherit;
}
.student-app{
  min-height:100vh;
}
.student-shell{
  display:flex;
  min-height:100vh;
}
.student-sidebar{
  position:fixed;
  inset:0 auto 0 0;
  width:210px;
  display:flex;
  flex-direction:column;
  background:linear-gradient(180deg,var(--sidebar) 0%,var(--sidebar-deep) 100%);
  color:#fff;
  border-right:1px solid rgba(255,255,255,.08);
}
.sidebar-brand{
  padding:1.4rem 1.2rem 1.1rem;
  border-bottom:1px solid var(--sidebar-line);
}
.brand-kicker{
  font-family:"Merriweather",serif;
  font-size:1rem;
  line-height:1.15;
  letter-spacing:.01em;
}
.brand-kicker span{
  display:block;
}
.brand-name{
  display:block;
  margin-top:.4rem;
  color:rgba(255,255,255,.74);
  font-size:.85rem;
}
.sidebar-student{
  padding:1.3rem 1.2rem 1.1rem;
  border-bottom:1px solid var(--sidebar-line);
}
.student-avatar{
  width:42px;
  height:42px;
  border-radius:50%;
  display:grid;
  place-items:center;
  background:linear-gradient(135deg,#f3bd77 0%,var(--amber) 100%);
  color:#fff;
  font-weight:800;
  font-size:1rem;
}
.sidebar-student strong{
  display:block;
  margin-top:.85rem;
  font-size:1rem;
}
.sidebar-student span{
  display:block;
  margin-top:.18rem;
  color:rgba(255,255,255,.72);
  font-size:.84rem;
}
.plan-badge{
  display:inline-flex;
  align-items:center;
  gap:.4rem;
  padding:.36rem .7rem;
  border-radius:999px;
  margin-top:.7rem;
  font-size:.76rem;
  font-weight:700;
}
.plan-badge.none{
  background:rgba(236,230,223,.18);
  color:#efe8df;
}
.plan-badge.basic{
  background:rgba(232,146,58,.18);
  color:#ffd9ab;
}
.plan-badge.pro{
  background:rgba(171,195,255,.18);
  color:#e4ecff;
}
.sidebar-nav{
  padding:1rem .9rem;
  display:grid;
  gap:.35rem;
  flex:1;
}
.sidebar-link,
.sidebar-logout,
.mobile-nav-link{
  display:flex;
  align-items:center;
  gap:.72rem;
  border:none;
  background:transparent;
  color:inherit;
  cursor:pointer;
  font:inherit;
  border-radius:14px;
}
.sidebar-link{
  padding:.86rem .9rem;
  color:rgba(255,255,255,.82);
  transition:background .2s ease,color .2s ease,transform .2s ease;
}
.sidebar-link:hover,
.sidebar-link.is-active{
  background:rgba(255,255,255,.09);
  color:#fff;
  transform:translateX(2px);
}
.sidebar-link i,
.sidebar-logout i,
.mobile-nav-link i{
  font-size:1.08rem;
}
.sidebar-footer{
  padding:1rem;
  border-top:1px solid var(--sidebar-line);
}
.sidebar-logout{
  width:100%;
  padding:.92rem .95rem;
  color:rgba(255,255,255,.84);
}
.page-main{
  margin-left:210px;
  width:calc(100% - 210px);
  min-height:100vh;
  display:flex;
  flex-direction:column;
}
.page-topbar{
  position:sticky;
  top:0;
  z-index:15;
  background:rgba(250,250,246,.95);
  backdrop-filter:blur(12px);
  border-bottom:1px solid var(--border);
}
.page-topbar-inner{
  max-width:1160px;
  margin:0 auto;
  padding:1.2rem 1.5rem 1rem;
  display:flex;
  align-items:flex-start;
  justify-content:space-between;
  gap:1rem;
}
.page-copy h1{
  margin:0;
  font-family:"Merriweather",serif;
  font-size:clamp(1.95rem,3vw,2.6rem);
  line-height:1.08;
}
.page-copy p{
  margin:.28rem 0 0;
  color:var(--ink-soft);
  font-size:.98rem;
}
.page-back{
  display:inline-flex;
  align-items:center;
  justify-content:center;
  gap:.5rem;
  padding:.86rem 1.12rem;
  border-radius:16px;
  border:1px solid var(--border);
  background:rgba(255,255,255,.92);
  color:var(--ink);
  font-weight:800;
  box-shadow:0 10px 24px rgba(60,30,40,.06);
}
.page-scroll{
  flex:1;
  min-height:0;
  overflow-y:auto;
  -webkit-overflow-scrolling:touch;
}
.page-content{
  max-width:1160px;
  margin:0 auto;
  padding:1.35rem 1.5rem 6rem;
}
.status-line{
  min-height:1.4rem;
  margin:0 0 .95rem;
  font-size:.95rem;
  color:var(--ink-soft);
}
.status-line.success{
  color:#2d7b52;
}
.status-line.error{
  color:#bb4357;
}
.dashboard-section{
  margin-top:1.1rem;
}
.section-label{
  margin:0 0 .7rem;
  color:var(--ink-soft);
  font-size:.78rem;
  font-weight:800;
  letter-spacing:.16em;
  text-transform:uppercase;
}
.articles-head{
  display:flex;
  align-items:flex-end;
  justify-content:space-between;
  gap:1rem;
  flex-wrap:wrap;
}
.articles-copy{
  margin:-.15rem 0 0;
  color:var(--ink-soft);
  font-size:.94rem;
}
.article-switch{
  display:inline-flex;
  align-items:center;
  gap:.45rem;
  padding:.38rem;
  border-radius:18px;
  background:rgba(255,255,255,.88);
  border:1px solid var(--border);
  box-shadow:0 10px 24px rgba(60,30,40,.06);
}
.article-switch button{
  min-width:92px;
  padding:.72rem .95rem;
  border:none;
  border-radius:12px;
  background:transparent;
  color:var(--ink-soft);
  font-weight:700;
  cursor:pointer;
  transition:all .2s ease;
}
.article-switch button.is-active{
  background:linear-gradient(135deg,var(--amber-soft) 0%,var(--amber) 100%);
  color:var(--maroon-deep);
  box-shadow:0 10px 18px rgba(232,146,58,.2);
}
.article-grid{
  display:grid;
  grid-template-columns:repeat(3,minmax(0,1fr));
  gap:.95rem;
}
.article-card{
  background:var(--surface);
  border:1px solid var(--border);
  border-radius:var(--radius-lg);
  box-shadow:var(--shadow);
  padding:1rem;
}
.article-meta{
  display:flex;
  align-items:center;
  justify-content:space-between;
  gap:.75rem;
  margin-bottom:.9rem;
}
.article-category{
  display:inline-flex;
  align-items:center;
  padding:.38rem .72rem;
  border-radius:999px;
  background:rgba(106,31,54,.08);
  color:var(--maroon);
  font-size:.74rem;
  font-weight:800;
  letter-spacing:.08em;
  text-transform:uppercase;
}
.article-date{
  color:var(--ink-soft);
  font-size:.84rem;
  font-weight:700;
}
.article-title{
  display:flex;
  align-items:flex-start;
  gap:.65rem;
}
.article-title i{
  margin-top:.14rem;
  color:var(--maroon);
  font-size:1rem;
}
.article-title strong{
  display:block;
  font-size:1.05rem;
  line-height:1.42;
}
.article-summary{
  margin:.55rem 0 0;
  color:var(--ink-soft);
  font-size:.92rem;
  line-height:1.65;
}
.article-link{
  display:inline-flex;
  align-items:center;
  gap:.42rem;
  margin-top:1rem;
  color:var(--maroon);
  font-weight:700;
}
.article-link.is-muted{
  color:var(--ink-soft);
}
.article-empty{
  padding:1.15rem 1.2rem;
  border-radius:var(--radius-lg);
  background:var(--surface);
  border:1px dashed rgba(106,31,54,.16);
  color:var(--ink-soft);
}
.article-empty strong{
  display:block;
  color:var(--ink);
}
.article-empty p{
  margin:.35rem 0 0;
}
.mobile-nav{
  display:none;
}
@media (max-width: 1024px){
  .student-sidebar{
    display:none;
  }
  .page-main{
    margin-left:0;
    width:100%;
  }
  .page-topbar-inner,
  .page-content{
    padding-left:1rem;
    padding-right:1rem;
  }
  .mobile-nav{
    position:fixed;
    left:0;
    right:0;
    bottom:0;
    z-index:25;
    display:grid;
    grid-auto-flow:column;
    grid-auto-columns:minmax(82px,1fr);
    gap:.4rem;
    padding:.65rem .7rem calc(.65rem + env(safe-area-inset-bottom));
    background:rgba(255,255,255,.95);
    border-top:1px solid var(--border);
    backdrop-filter:blur(14px);
    overflow-x:auto;
  }
  .mobile-nav-link{
    padding:.72rem .65rem;
    flex-direction:column;
    justify-content:center;
    gap:.26rem;
    color:var(--ink-soft);
    min-width:78px;
    white-space:nowrap;
  }
  .mobile-nav-link.is-active{
    background:rgba(106,31,54,.07);
    color:var(--maroon);
  }
  .mobile-nav-link span{
    font-size:.72rem;
    font-weight:700;
  }
  .article-grid{
    grid-template-columns:repeat(2,minmax(0,1fr));
  }
}
@media (max-width: 760px){
  .page-topbar-inner{
    flex-direction:column;
    align-items:flex-start;
  }
  .page-back{
    width:100%;
  }
  .articles-head{
    align-items:flex-start;
  }
  .article-switch{
    width:100%;
  }
  .article-switch button{
    flex:1;
  }
  .article-grid{
    grid-template-columns:1fr;
  }
  .page-content{
    padding-bottom:8rem;
  }
}
</style>
</head>
<body>
  <div class="student-app">
    <div class="student-shell">
      <aside class="student-sidebar">
        <div class="sidebar-brand">
          <div class="brand-kicker">
            <span>IB</span>
            <span>IMBA Beacon</span>
          </div>
          <small class="brand-name">Student Dashboard</small>
        </div>
        <div class="sidebar-student" id="student-summary"></div>
        <nav class="sidebar-nav" id="sidebar-nav"></nav>
        <div class="sidebar-footer">
          <button class="sidebar-logout" id="logout-btn" type="button">
            <i class="ti ti-logout"></i>
            <span>Log out</span>
          </button>
        </div>
      </aside>

      <main class="page-main">
        <header class="page-topbar">
          <div class="page-topbar-inner">
            <div class="page-copy">
              <h1>Articles</h1>
              <p>Current-affairs reads curated for IMBA interview preparation</p>
            </div>
            <a class="page-back" href="./student.html">
              <i class="ti ti-arrow-left"></i>
              <span>Dashboard</span>
            </a>
          </div>
        </header>

        <div class="page-scroll">
          <div class="page-content">
            <p class="status-line" id="page-status" aria-live="polite"></p>
            <div id="articles-root"></div>
          </div>
        </div>
      </main>
    </div>

    <nav class="mobile-nav" id="mobile-nav"></nav>
  </div>

  <script>
  (function () {
    const apiBase = (window.IMBA_SITE_CONFIG && window.IMBA_SITE_CONFIG.apiBaseUrl) || "";
    const USER_PLAN_KEY = "userPlan";
    const USER_NAME_KEY = "userName";
    const USER_EMAIL_KEY = "userEmail";
    const ARTICLE_VIEW_KEY = "dashboardArticleView";
    const ARTICLE_DATA_PATH = "./assets/articles.json";
    const NAV_ITEMS = [
      { id: "dashboard", label: "Dashboard", icon: "layout-dashboard", href: "./student.html" },
      { id: "recordings", label: "Recordings", icon: "video", href: "./student.html#section-recordings" },
      { id: "sheets", label: "Sheets", icon: "files", href: "./student.html#section-sheets" },
      { id: "quiz", label: "Quiz", icon: "help-square-rounded", href: "./student.html#section-quiz" },
      { id: "batch", label: "Batch Sessions", icon: "users-group", href: "./student.html#section-batch" },
      { id: "articles", label: "Articles", icon: "news", href: "./articles.html" },
      { id: "profile", label: "Profile", icon: "user-circle", href: "./student.html#section-profile" }
    ];

    const statusNode = document.getElementById("page-status");
    const studentSummaryNode = document.getElementById("student-summary");
    const sidebarNavNode = document.getElementById("sidebar-nav");
    const mobileNavNode = document.getElementById("mobile-nav");
    const articlesRootNode = document.getElementById("articles-root");
    const logoutButton = document.getElementById("logout-btn");

    let currentUser = null;
    let articleLibrary = {
      defaultView: "daily",
      daily: [],
      weekly: []
    };
    let currentArticleView = "daily";

    function setStatus(message, type) {
      statusNode.textContent = message || "";
      statusNode.className = "status-line" + (type ? " " + type : "");
    }

    function escapeHtml(value) {
      return String(value || "")
        .replace(/&/g, "&amp;")
        .replace(/</g, "&lt;")
        .replace(/>/g, "&gt;")
        .replace(/"/g, "&quot;")
        .replace(/'/g, "&#39;");
    }

    function normalizePlan(value) {
      return value === "basic" || value === "pro" || value === "none" ? value : "none";
    }

    function normalizeArticleView(value) {
      return value === "weekly" ? "weekly" : "daily";
    }

    function normalizeArticleItem(item) {
      return {
        category: item && item.category ? String(item.category) : "Interview Brief",
        date: item && item.date ? String(item.date) : "Update pending",
        title: item && item.title ? String(item.title) : "Add article title",
        summary: item && item.summary ? String(item.summary) : "Add a short summary for this article.",
        url: item && typeof item.url === "string" ? item.url.trim() : "",
        cta: item && item.cta ? String(item.cta) : "Read article",
        icon: item && item.icon ? String(item.icon) : "article"
      };
    }

    function normalizeArticleLibrary(payload) {
      return {
        defaultView: normalizeArticleView(payload && payload.defaultView),
        daily: Array.isArray(payload && payload.daily) ? payload.daily.map(normalizeArticleItem) : [],
        weekly: Array.isArray(payload && payload.weekly) ? payload.weekly.map(normalizeArticleItem) : []
      };
    }

    function getArticleViewMeta(view) {
      if (view === "weekly") {
        return {
          title: "Weekly top news",
          copy: "The strongest stories of the week for quick interview revision."
        };
      }

      return {
        title: "Daily current-affairs reads",
        copy: "Fresh daily stories students can revise before mocks and interview rounds."
      };
    }

    function getSafeArticleUrl(value) {
      const url = String(value || "").trim();
      if (!url) {
        return "";
      }

      if (/^https?:\/\//i.test(url) || /^\//.test(url) || /^\.{1,2}\//.test(url)) {
        return url;
      }

      return "";
    }

    function inferPlanFromUser(user) {
      const planId = user && user.courseAccess && user.courseAccess.purchased
        ? normalizePlan(user.courseAccess.planId)
        : "none";
      return planId === "basic" || planId === "pro" ? planId : "none";
    }

    function getStudentState(user) {
      const sessionEmail = (user && user.email) || "";
      const sessionName = (user && user.name) || "Student";
      const storedEmail = localStorage.getItem(USER_EMAIL_KEY) || "";

      if (sessionEmail && storedEmail && storedEmail.toLowerCase() !== sessionEmail.toLowerCase()) {
        localStorage.setItem(USER_NAME_KEY, sessionName);
        localStorage.setItem(USER_EMAIL_KEY, sessionEmail);
        localStorage.setItem(USER_PLAN_KEY, inferPlanFromUser(user));
      } else {
        localStorage.setItem(USER_NAME_KEY, localStorage.getItem(USER_NAME_KEY) || sessionName);
        localStorage.setItem(USER_EMAIL_KEY, localStorage.getItem(USER_EMAIL_KEY) || sessionEmail);
        const storedPlan = localStorage.getItem(USER_PLAN_KEY);
        if (!storedPlan) {
          localStorage.setItem(USER_PLAN_KEY, inferPlanFromUser(user));
        } else if (normalizePlan(storedPlan) === "none" && inferPlanFromUser(user) !== "none") {
          localStorage.setItem(USER_PLAN_KEY, inferPlanFromUser(user));
        }
      }

      const name = localStorage.getItem(USER_NAME_KEY) || sessionName;
      const email = localStorage.getItem(USER_EMAIL_KEY) || sessionEmail || "student@example.com";
      const initials = (name || "IB")
        .split(" ")
        .filter(Boolean)
        .slice(0, 2)
        .map(function (part) { return part.charAt(0).toUpperCase(); })
        .join("") || "IB";
      const plan = normalizePlan(localStorage.getItem(USER_PLAN_KEY));

      return {
        name: name,
        email: email,
        initials: initials,
        plan: plan
      };
    }

    function getPlanBadge(plan) {
      if (plan === "basic") return { label: "Basic Plan", className: "basic" };
      if (plan === "pro") return { label: "Pro Plan", className: "pro" };
      return { label: "Not Enrolled", className: "none" };
    }

    function renderSidebar(student) {
      const badge = getPlanBadge(student.plan);
      studentSummaryNode.innerHTML = `
        <div class="student-avatar">${escapeHtml(student.initials)}</div>
        <strong>${escapeHtml(student.name)}</strong>
        <span>${escapeHtml(student.email)}</span>
        <span class="plan-badge ${badge.className}">
          <i class="ti ti-crown"></i>
          ${escapeHtml(badge.label)}
        </span>
      `;

      sidebarNavNode.innerHTML = NAV_ITEMS.map(function (item) {
        return `
          <a href="${item.href}" class="sidebar-link${item.id === "articles" ? " is-active" : ""}">
            <i class="ti ti-${item.icon}"></i>
            <span>${escapeHtml(item.label)}</span>
          </a>
        `;
      }).join("");

      mobileNavNode.innerHTML = NAV_ITEMS.concat([{ id: "logout", label: "Logout", icon: "logout" }]).map(function (item) {
        if (item.id === "logout") {
          return `
            <button class="mobile-nav-link" type="button" data-logout-trigger>
              <i class="ti ti-${item.icon}"></i>
              <span>${escapeHtml(item.label)}</span>
            </button>
          `;
        }

        return `
          <a href="${item.href}" class="mobile-nav-link${item.id === "articles" ? " is-active" : ""}">
            <i class="ti ti-${item.icon}"></i>
            <span>${escapeHtml(item.label)}</span>
          </a>
        `;
      }).join("");
    }

    function renderArticlesPage() {
      const view = normalizeArticleView(currentArticleView);
      const meta = getArticleViewMeta(view);
      const articles = Array.isArray(articleLibrary[view]) ? articleLibrary[view] : [];

      articlesRootNode.innerHTML = `
        <section class="dashboard-section">
          <div class="articles-head">
            <div>
              <p class="section-label">Articles</p>
              <p class="articles-copy"><strong>${escapeHtml(meta.title)}</strong> · ${escapeHtml(meta.copy)}</p>
            </div>
            <div class="article-switch" role="tablist" aria-label="Article categories">
              <button type="button" data-article-view="daily" class="${view === "daily" ? "is-active" : ""}" aria-pressed="${view === "daily" ? "true" : "false"}">Daily</button>
              <button type="button" data-article-view="weekly" class="${view === "weekly" ? "is-active" : ""}" aria-pressed="${view === "weekly" ? "true" : "false"}">Weekly</button>
            </div>
          </div>
          ${articles.length ? `
            <div class="article-grid">
              ${articles.map(function (article) {
                const href = getSafeArticleUrl(article.url);
                const isExternal = /^https?:\/\//i.test(href);

                return `
                  <article class="article-card">
                    <div class="article-meta">
                      <span class="article-category">${escapeHtml(article.category)}</span>
                      <span class="article-date">${escapeHtml(article.date)}</span>
                    </div>
                    <div class="article-title">
                      <i class="ti ti-${escapeHtml(article.icon)}"></i>
                      <div>
                        <strong>${escapeHtml(article.title)}</strong>
                        <p class="article-summary">${escapeHtml(article.summary)}</p>
                      </div>
                    </div>
                    ${href ? `
                      <a class="article-link" href="${escapeHtml(href)}"${isExternal ? ' target="_blank" rel="noopener noreferrer"' : ""}>
                        <span>${escapeHtml(article.cta)}</span>
                        <i class="ti ti-arrow-up-right"></i>
                      </a>
                    ` : `
                      <span class="article-link is-muted">Link pending</span>
                    `}
                  </article>
                `;
              }).join("")}
            </div>
          ` : `
            <div class="article-empty">
              <strong>No ${escapeHtml(view)} articles added yet.</strong>
              <p>Add your first ${escapeHtml(view)} story and it will appear here automatically.</p>
            </div>
          `}
        </section>
      `;
    }

    async function fetchSession() {
      const response = await fetch(`${apiBase}/api/auth/session`, { credentials: "include" });
      if (!response.ok) {
        throw new Error("Unable to read session.");
      }
      const data = await response.json();
      return data.user || null;
    }

    async function fetchArticles() {
      try {
        const response = await fetch(ARTICLE_DATA_PATH, { cache: "no-store" });
        if (!response.ok) {
          throw new Error("Unable to load article data.");
        }
        return normalizeArticleLibrary(await response.json());
      } catch (error) {
        return {
          defaultView: "daily",
          daily: [],
          weekly: []
        };
      }
    }

    async function logout() {
      try {
        const response = await fetch(`${apiBase}/api/auth/logout`, {
          method: "POST",
          credentials: "include"
        });
        if (!response.ok) {
          throw new Error("Logout failed.");
        }

        localStorage.removeItem(USER_PLAN_KEY);
        localStorage.removeItem(USER_NAME_KEY);
        localStorage.removeItem(USER_EMAIL_KEY);
        window.location.href = "./index.html";
      } catch (error) {
        setStatus(error.message || "Unable to logout right now.", "error");
      }
    }

    document.addEventListener("click", function (event) {
      const articleViewButton = event.target.closest("[data-article-view]");
      if (articleViewButton) {
        event.preventDefault();
        currentArticleView = normalizeArticleView(articleViewButton.getAttribute("data-article-view"));
        localStorage.setItem(ARTICLE_VIEW_KEY, currentArticleView);
        renderArticlesPage();
        return;
      }

      const mobileLogoutButton = event.target.closest("[data-logout-trigger]");
      if (mobileLogoutButton) {
        event.preventDefault();
        logout();
      }
    });

    logoutButton.addEventListener("click", logout);

    Promise.all([fetchSession(), fetchArticles()])
      .then(function (results) {
        currentUser = results[0];
        articleLibrary = results[1];
        currentArticleView = localStorage.getItem(ARTICLE_VIEW_KEY)
          ? normalizeArticleView(localStorage.getItem(ARTICLE_VIEW_KEY))
          : normalizeArticleView(articleLibrary.defaultView);

        if (!currentUser) {
          window.location.href = "./login.html?next=./articles.html";
          return;
        }

        renderSidebar(getStudentState(currentUser));
        renderArticlesPage();
        setStatus("Articles loaded successfully.", "success");
      })
      .catch(function (error) {
        setStatus(error.message || "Unable to load the articles page.", "error");
      });
  })();
  </script>
</body>
</html>
