<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Articles | IMBA Beacon</title>
<script src="./site-config.js"></script>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
<link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800&family=Merriweather:wght@700&display=swap" rel="stylesheet"/>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@latest/tabler-icons.min.css"/>
<style>
:root{
  --bg:#FAFAF6;
  --surface:#fffdf9;
  --surface-soft:#f7f1e8;
  --surface-muted:#f1ebe2;
  --sidebar:#3f2331;
  --sidebar-deep:#2c1620;
  --sidebar-line:rgba(255,255,255,.10);
  --ink:#40252f;
  --ink-soft:#866f76;
  --maroon:#6a1f36;
  --maroon-deep:#4f1629;
  --amber:#E8923A;
  --amber-soft:#f6d8ad;
  --amber-tint:#fff4e6;
  --pro-badge:#dce8ff;
  --pro-text:#4060a0;
  --basic-badge:#f7deb6;
  --basic-text:#83521d;
  --none-badge:#ece6df;
  --none-text:#756860;
  --border:#eadfd2;
  --shadow:0 16px 38px rgba(55,28,37,.08);
  --radius-xl:28px;
  --radius-lg:20px;
  --radius-md:16px;
  --radius-sm:12px;
}
*{ box-sizing:border-box; }
html{ height:100%; scroll-behavior:smooth; }
body{
  margin:0;
  height:100%;
  min-height:100vh;
  overflow:hidden;
  font-family:"Manrope",system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;
  background:linear-gradient(180deg,#fcfbf7 0%,#f4efe7 100%);
  color:var(--ink);
}
a{ color:inherit; text-decoration:none; }
button{ font:inherit; }

/* ── Sidebar ── */
.student-sidebar{
  position:fixed;
  inset:0 auto 0 0;
  width:210px;
  display:flex;
  flex-direction:column;
  background:linear-gradient(180deg,var(--sidebar) 0%,var(--sidebar-deep) 100%);
  color:#fff;
  border-right:1px solid rgba(255,255,255,.08);
  z-index:20;
}
.sidebar-brand{ padding:1.4rem 1.2rem 1.1rem; border-bottom:1px solid var(--sidebar-line); }
.brand-kicker{ font-family:"Merriweather",serif; font-size:1rem; line-height:1.15; letter-spacing:.01em; }
.brand-kicker span{ display:block; }
.brand-name{ display:block; margin-top:.4rem; color:rgba(255,255,255,.74); font-size:.85rem; }
.sidebar-student{ padding:1.3rem 1.2rem 1.1rem; border-bottom:1px solid var(--sidebar-line); }
.student-avatar{
  width:42px; height:42px; border-radius:50%;
  display:grid; place-items:center;
  background:linear-gradient(135deg,#f3bd77 0%,var(--amber) 100%);
  color:#fff; font-weight:800; font-size:1rem;
}
.sidebar-student strong{ display:block; margin-top:.85rem; font-size:1rem; }
.sidebar-student span{ display:block; margin-top:.18rem; color:rgba(255,255,255,.72); font-size:.84rem; }
.plan-badge{
  display:inline-flex; align-items:center; gap:.4rem;
  padding:.36rem .7rem; border-radius:999px; margin-top:.7rem;
  font-size:.76rem; font-weight:700;
}
.plan-badge.none{ background:rgba(236,230,223,.18); color:#efe8df; }
.plan-badge.basic{ background:rgba(232,146,58,.18); color:#ffd9ab; }
.plan-badge.pro{ background:rgba(171,195,255,.18); color:#e4ecff; }
.sidebar-nav{ padding:1rem .9rem; display:grid; gap:.35rem; flex:1; }
.sidebar-link,
.sidebar-logout{
  display:flex; align-items:center; gap:.72rem;
  border:none; background:transparent; color:inherit;
  cursor:pointer; font:inherit; border-radius:14px;
}
.sidebar-link{ padding:.86rem .9rem; color:rgba(255,255,255,.82); transition:background .2s ease,color .2s ease,transform .2s ease; }
.sidebar-link:hover,
.sidebar-link.is-active{ background:rgba(255,255,255,.09); color:#fff; transform:translateX(2px); }
.sidebar-link i,
.sidebar-logout i{ font-size:1.08rem; }
.sidebar-footer{ padding:1rem; border-top:1px solid var(--sidebar-line); }
.sidebar-logout{ width:100%; padding:.92rem .95rem; color:rgba(255,255,255,.84); }

/* ── Main ── */
.articles-main{
  margin-left:210px;
  width:calc(100% - 210px);
  height:100vh;
  display:flex;
  flex-direction:column;
  overflow:hidden;
}

/* ── Topbar ── */
.articles-topbar{
  position:sticky; top:0; z-index:15;
  background:rgba(250,250,246,.95);
  backdrop-filter:blur(12px);
  border-bottom:1px solid var(--border);
  padding:1.2rem 1.5rem 1rem;
  display:flex;
  align-items:center;
  justify-content:space-between;
}
.articles-topbar h1{
  margin:0;
  font-family:"Merriweather",serif;
  font-size:clamp(1.6rem,2.5vw,2.2rem);
  line-height:1.1;
}
.articles-topbar p{ margin:.25rem 0 0; color:var(--ink-soft); font-size:.95rem; }
.back-btn{
  display:inline-flex; align-items:center; gap:.5rem;
  padding:.7rem 1.1rem;
  border-radius:14px;
  background:var(--surface);
  border:1px solid var(--border);
  color:var(--ink);
  font-weight:700;
  font-size:.9rem;
  cursor:pointer;
  transition:transform .2s ease;
}
.back-btn:hover{ transform:translateY(-1px); }

/* ── Scroll ── */
.articles-scroll{
  flex:1;
  min-height:0;
  overflow-y:auto;
  overscroll-behavior:contain;
}
.articles-content{
  max-width:1160px;
  margin:0 auto;
  padding:1.5rem 1.5rem 6rem;
}

/* ── Cards grid ── */
.articles-grid{
  display:grid;
  grid-template-columns:repeat(auto-fill,minmax(300px,1fr));
  gap:1rem;
}
.article-card{
  background:var(--surface);
  border:1px solid var(--border);
  border-radius:var(--radius-lg);
  box-shadow:var(--shadow);
  padding:1.2rem 1.3rem;
  cursor:pointer;
  transition:transform .2s ease, box-shadow .2s ease;
}
.article-card:hover{
  transform:translateY(-3px);
  box-shadow:0 20px 44px rgba(55,28,37,.12);
}
.card-meta{
  display:flex;
  align-items:center;
  justify-content:space-between;
  margin-bottom:.95rem;
}
.category-pill{
  display:inline-flex;
  padding:.3rem .72rem;
  border-radius:999px;
  font-size:.72rem;
  font-weight:800;
  letter-spacing:.04em;
  text-transform:uppercase;
  background:rgba(106,31,54,.09);
  color:var(--maroon);
}
.card-date{ font-size:.82rem; color:var(--ink-soft); }
.card-body{ display:flex; align-items:flex-start; gap:.8rem; }
.card-body i{ font-size:1.2rem; color:var(--maroon); margin-top:.1rem; flex-shrink:0; }
.card-body h3{ margin:0 0 .4rem; font-size:1.1rem; line-height:1.3; }
.card-body p{ margin:0; color:var(--ink-soft); font-size:.9rem; line-height:1.5; }
.card-footer{ margin-top:1rem; display:flex; align-items:center; gap:.4rem; font-size:.88rem; font-weight:700; color:var(--maroon); }

/* ── Article iframe view ── */
.article-view{ display:none; flex-direction:column; height:100%; }
.article-view.active{ display:flex; }
.article-frame{
  flex:1;
  border:none;
  width:100%;
  height:100%;
}

/* ── Mobile ── */
.mobile-nav{ display:none; }
@media (max-width:1024px){
  body{ overflow:auto; }
  .student-sidebar{ display:none; }
  .articles-main{ margin-left:0; width:100%; height:auto; overflow:visible; }
  .articles-topbar{ padding:1rem; }
  .articles-content{ padding:1rem 1rem 6rem; }
  .article-view.active{ height:calc(100vh - 60px); position:fixed; inset:60px 0 0 0; background:var(--bg); z-index:50; }
  .mobile-nav{
    position:fixed; left:0; right:0; bottom:0; z-index:25;
    display:grid; grid-auto-flow:column; grid-auto-columns:minmax(72px,1fr);
    gap:.3rem; padding:.6rem .6rem calc(.6rem + env(safe-area-inset-bottom));
    background:rgba(255,255,255,.95); border-top:1px solid var(--border);
    backdrop-filter:blur(14px); overflow-x:auto;
  }
  .mobile-nav-link{
    display:flex; flex-direction:column; align-items:center; justify-content:center;
    gap:.22rem; color:var(--ink-soft); min-width:68px;
    padding:.65rem .5rem; border-radius:12px; border:none; background:transparent;
    cursor:pointer; font:inherit; white-space:nowrap;
  }
  .mobile-nav-link.is-active{ background:rgba(106,31,54,.07); color:var(--maroon); }
  .mobile-nav-link i{ font-size:1.08rem; }
  .mobile-nav-link span{ font-size:.7rem; font-weight:700; }
}
</style>
</head>
<body>
<div class="student-app">
  <div class="student-shell">

    <!-- Sidebar -->
    <aside class="student-sidebar">
      <div class="sidebar-brand">
        <div class="brand-kicker">
          <span>IB</span>
          <span>IMBA Beacon</span>
        </div>
        <span class="brand-name">Student Dashboard</span>
      </div>
      <div class="sidebar-student" id="student-summary"></div>
      <nav class="sidebar-nav" id="sidebar-nav"></nav>
      <div class="sidebar-footer">
        <button class="sidebar-logout" id="logout-btn" type="button">
          <i class="ti ti-logout"></i>
          Log out
        </button>
      </div>
    </aside>

    <!-- Main -->
    <main class="articles-main">

      <!-- Topbar — cards view -->
      <div class="articles-topbar" id="topbar-cards">
        <div>
          <h1>Articles</h1>
          <p>Current-affairs reads curated for IMBA interview preparation</p>
        </div>
        <a href="./student.html" class="back-btn">
          <i class="ti ti-arrow-left"></i> Dashboard
        </a>
      </div>

      <!-- Topbar — article reading view -->
      <div class="articles-topbar" id="topbar-article" style="display:none">
        <div>
          <h1 id="article-title-bar" style="font-size:clamp(1.1rem,2vw,1.5rem)"></h1>
          <p id="article-cat-bar"></p>
        </div>
        <button class="back-btn" id="back-to-articles">
          <i class="ti ti-arrow-left"></i> All Articles
        </button>
      </div>

      <!-- Cards view -->
      <div class="articles-scroll" id="cards-view">
        <div class="articles-content">
          <div class="articles-grid" id="articles-grid"></div>
        </div>
      </div>

      <!-- Article iframe view -->
      <div class="article-view" id="article-view">
        <iframe class="article-frame" id="article-frame" title="Article"></iframe>
      </div>

    </main>

    <!-- Mobile nav -->
    <nav class="mobile-nav" id="mobile-nav"></nav>

  </div>
</div>

<script>
const API_BASE = (window.IMBA_SITE_CONFIG && window.IMBA_SITE_CONFIG.apiBaseUrl) || "";

const ARTICLES = [
  {
    file: "Bengal_Elections.html",
    title: "West Bengal 2026 Election",
    subtitle: "Deep dive into challenges, illegal voters and the SIR purge debate before the polls.",
    category: "National Affairs",
    date: "May 2026",
    icon: "ti-map-pin"
  },
  {
    file: "Tamil_nadu_elections.html",
    title: "Tamil Nadu 2026: TVK Victory Report",
    subtitle: "Comprehensive breakdown of results, seat movement and the key political takeaway.",
    category: "National Affairs",
    date: "May 2026",
    icon: "ti-map-pin"
  },
  {
    file: "PM_modi_visit_.html",
    title: "PM Modi's 5-Nation Tour May 2026",
    subtitle: "Strategic deep dive into bilateral ties, trade deals and the broader geopolitical impact.",
    category: "International Affairs",
    date: "May 2026",
    icon: "ti-world"
  },
  {
    file: "IIT-Mandi-interview-prep-PDF__1_.html",
    title: "NEET Paper Leak Report: 2024–2026",
    subtitle: "Crisis overview, the retest debate and the policy implications students should understand.",
    category: "Education",
    date: "May 2026",
    icon: "ti-school"
  }
];

const NAV_ITEMS = [
  { id: "dashboard",  label: "Dashboard",      icon: "layout-dashboard",    href: "./student.html" },
  { id: "recordings", label: "Recordings",      icon: "video",               href: "./student.html#section-recordings" },
  { id: "sheets",     label: "Sheets",          icon: "files",               href: "./student.html#section-sheets" },
  { id: "quiz",       label: "Quiz",            icon: "help-square-rounded", href: "./student.html#section-quiz" },
  { id: "batch",      label: "Batch Sessions",  icon: "users-group",         href: "./student.html#section-batch" },
  { id: "articles",   label: "Articles",        icon: "news",                href: "./articles.html" },
  { id: "profile",    label: "Profile",         icon: "user-circle",         href: "./student.html#section-profile" }
];

// ── Sidebar ──────────────────────────────────────────────
function buildSidebar(student) {
  const initials = (student.name || "IB")
    .split(" ")
    .map(w => w[0])
    .join("")
    .slice(0, 2)
    .toUpperCase();

  const planLabel = student.plan === "pro" ? "Pro Plan" : student.plan === "basic" ? "Basic Plan" : "Not Enrolled";
  const planIcon  = student.plan === "pro" ? "ti-crown" : student.plan === "basic" ? "ti-star" : "ti-user";

  document.getElementById("student-summary").innerHTML = `
    <div class="student-avatar">${initials}</div>
    <strong>${student.name || "Student"}</strong>
    <span>${student.email || ""}</span>
    <span class="plan-badge ${student.plan || "none"}">
      <i class="ti ${planIcon}"></i>${planLabel}
    </span>`;

  document.getElementById("sidebar-nav").innerHTML = NAV_ITEMS.map(item => `
    <a href="${item.href}" class="sidebar-link${item.id === "articles" ? " is-active" : ""}">
      <i class="ti ti-${item.icon}"></i>${item.label}
    </a>`).join("");

  document.getElementById("mobile-nav").innerHTML = NAV_ITEMS.map(item => `
    <a href="${item.href}" class="mobile-nav-link${item.id === "articles" ? " is-active" : ""}">
      <i class="ti ti-${item.icon}"></i><span>${item.label}</span>
    </a>`).join("");
}

// ── Logout ───────────────────────────────────────────────
document.getElementById("logout-btn").addEventListener("click", async () => {
  try { await fetch(API_BASE + "/api/auth/logout", { method: "POST", credentials: "include" }); } catch(e) {}
  window.location.href = "./login.html";
});

// ── Article cards ─────────────────────────────────────────
function buildCards() {
  document.getElementById("articles-grid").innerHTML = ARTICLES.map((a, i) => `
    <div class="article-card" data-index="${i}" role="button" tabindex="0" aria-label="Read: ${a.title}">
      <div class="card-meta">
        <span class="category-pill">${a.category}</span>
        <span class="card-date">${a.date}</span>
      </div>
      <div class="card-body">
        <i class="ti ${a.icon}" aria-hidden="true"></i>
        <div>
          <h3>${a.title}</h3>
          <p>${a.subtitle}</p>
        </div>
      </div>
      <div class="card-footer">
        Read article <i class="ti ti-arrow-right" aria-hidden="true"></i>
      </div>
    </div>`).join("");

  document.querySelectorAll(".article-card").forEach(card => {
    card.addEventListener("click", () => openArticle(parseInt(card.dataset.index)));
    card.addEventListener("keydown", e => { if (e.key === "Enter") openArticle(parseInt(card.dataset.index)); });
  });
}

// ── Open article inline ───────────────────────────────────
function openArticle(index) {
  const a = ARTICLES[index];
  document.getElementById("cards-view").style.display = "none";
  document.getElementById("topbar-cards").style.display = "none";
  document.getElementById("topbar-article").style.display = "flex";
  document.getElementById("article-title-bar").textContent = a.title;
  document.getElementById("article-cat-bar").textContent = a.category + " · " + a.date;
  document.getElementById("article-frame").src = "./" + a.file;
  document.getElementById("article-view").classList.add("active");
}

// ── Back to cards ─────────────────────────────────────────
document.getElementById("back-to-articles").addEventListener("click", () => {
  document.getElementById("article-view").classList.remove("active");
  document.getElementById("article-frame").src = "";
  document.getElementById("topbar-article").style.display = "none";
  document.getElementById("topbar-cards").style.display = "flex";
  document.getElementById("cards-view").style.display = "";
});

// ── Session fetch ─────────────────────────────────────────
async function init() {
  try {
    const res = await fetch(API_BASE + "/api/auth/session", { credentials: "include" });
    if (!res.ok) { window.location.href = "./login.html"; return; }
    const data = await res.json();
    const student = data.user;
    if (!student) { window.location.href = "./login.html"; return; }
    buildSidebar(student);
    buildCards();
  } catch(e) {
    window.location.href = "./login.html";
  }
}

init();
</script>
</body>
</html>
