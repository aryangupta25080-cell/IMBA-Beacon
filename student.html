<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Student Dashboard | IMBA Beacon</title>
<script src="./site-config.js"></script>
<script src="https://checkout.razorpay.com/v1/checkout.js"></script>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
<link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800&family=Merriweather:wght@700&display=swap" rel="stylesheet"/>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@latest/tabler-icons.min.css"/>
<style>
:root{
  --bg:#FAFAF6;
  --surface:#fffdf9;
  --surface-soft:#f7f1e8;
  --surface-muted:#f1ebe2;
  --sidebar:#3f2331;
  --sidebar-deep:#2c1620;
  --sidebar-line:rgba(255,255,255,.10);
  --ink:#40252f;
  --ink-soft:#866f76;
  --maroon:#6a1f36;
  --maroon-deep:#4f1629;
  --amber:#E8923A;
  --amber-soft:#f6d8ad;
  --amber-tint:#fff4e6;
  --pro-badge:#dce8ff;
  --pro-text:#4060a0;
  --basic-badge:#f7deb6;
  --basic-text:#83521d;
  --none-badge:#ece6df;
  --none-text:#756860;
  --border:#eadfd2;
  --shadow:0 16px 38px rgba(55,28,37,.08);
  --radius-xl:28px;
  --radius-lg:20px;
  --radius-md:16px;
  --radius-sm:12px;
}
*{
  box-sizing:border-box;
}
html{
  height:100%;
  scroll-behavior:smooth;
}
body{
  margin:0;
  height:100%;
  min-height:100vh;
  overflow:hidden;
  font-family:"Manrope",system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;
  background:linear-gradient(180deg,#fcfbf7 0%,#f4efe7 100%);
  color:var(--ink);
}
a{
  color:inherit;
  text-decoration:none;
}
button{
  font:inherit;
}
.student-app{
  min-height:100vh;
}
.student-shell{
  display:flex;
  min-height:100vh;
}
.student-sidebar{
  position:fixed;
  inset:0 auto 0 0;
  width:210px;
  display:flex;
  flex-direction:column;
  background:linear-gradient(180deg,var(--sidebar) 0%,var(--sidebar-deep) 100%);
  color:#fff;
  border-right:1px solid rgba(255,255,255,.08);
}
.sidebar-brand{
  padding:1.4rem 1.2rem 1.1rem;
  border-bottom:1px solid var(--sidebar-line);
}
.brand-kicker{
  font-family:"Merriweather",serif;
  font-size:1rem;
  line-height:1.15;
  letter-spacing:.01em;
}
.brand-kicker span{
  display:block;
}
.brand-name{
  display:block;
  margin-top:.4rem;
  color:rgba(255,255,255,.74);
  font-size:.85rem;
}
.sidebar-student{
  padding:1.3rem 1.2rem 1.1rem;
  border-bottom:1px solid var(--sidebar-line);
}
.student-avatar{
  width:42px;
  height:42px;
  border-radius:50%;
  display:grid;
  place-items:center;
  background:linear-gradient(135deg,#f3bd77 0%,var(--amber) 100%);
  color:#fff;
  font-weight:800;
  font-size:1rem;
}
.sidebar-student strong{
  display:block;
  margin-top:.85rem;
  font-size:1rem;
}
.sidebar-student span{
  display:block;
  margin-top:.18rem;
  color:rgba(255,255,255,.72);
  font-size:.84rem;
}
.plan-badge{
  display:inline-flex;
  align-items:center;
  gap:.4rem;
  padding:.36rem .7rem;
  border-radius:999px;
  margin-top:.7rem;
  font-size:.76rem;
  font-weight:700;
}
.plan-badge.none{
  background:rgba(236,230,223,.18);
  color:#efe8df;
}
.plan-badge.basic{
  background:rgba(232,146,58,.18);
  color:#ffd9ab;
}
.plan-badge.pro{
  background:rgba(171,195,255,.18);
  color:#e4ecff;
}
.sidebar-nav{
  padding:1rem .9rem;
  display:grid;
  gap:.35rem;
  flex:1;
}
.sidebar-link,
.sidebar-logout,
.mobile-nav-link{
  display:flex;
  align-items:center;
  gap:.72rem;
  border:none;
  background:transparent;
  color:inherit;
  cursor:pointer;
  font:inherit;
  border-radius:14px;
}
.sidebar-link{
  padding:.86rem .9rem;
  color:rgba(255,255,255,.82);
  transition:background .2s ease,color .2s ease,transform .2s ease;
}
.sidebar-link:hover,
.sidebar-link.is-active{
  background:rgba(255,255,255,.09);
  color:#fff;
  transform:translateX(2px);
}
.sidebar-link i,
.sidebar-logout i,
.mobile-nav-link i{
  font-size:1.08rem;
}
.sidebar-footer{
  padding:1rem;
  border-top:1px solid var(--sidebar-line);
}
.sidebar-logout{
  width:100%;
  padding:.92rem .95rem;
  color:rgba(255,255,255,.84);
}
.dashboard-main{
  margin-left:210px;
  width:calc(100% - 210px);
  height:100vh;
  min-height:100vh;
  display:flex;
  flex-direction:column;
  overflow:hidden;
}
.dashboard-topbar{
  position:sticky;
  top:0;
  z-index:15;
  background:rgba(250,250,246,.95);
  backdrop-filter:blur(12px);
  border-bottom:1px solid var(--border);
}
.topbar-inner{
  max-width:1160px;
  margin:0 auto;
  padding:1.2rem 1.5rem 1rem;
  display:flex;
  align-items:flex-start;
  justify-content:space-between;
  gap:1rem;
}
.topbar-copy h1{
  margin:0;
  font-family:"Merriweather",serif;
  font-size:clamp(1.95rem,3vw,2.6rem);
  line-height:1.08;
}
.topbar-copy p{
  margin:.28rem 0 0;
  color:var(--ink-soft);
  font-size:.98rem;
}
.plan-pills{
  display:flex;
  align-items:center;
  gap:.5rem;
  padding:.42rem;
  border-radius:18px;
  background:rgba(255,255,255,.92);
  border:1px solid var(--border);
  box-shadow:0 10px 24px rgba(60,30,40,.06);
}
.plan-pills button{
  min-width:84px;
  padding:.72rem .95rem;
  border-radius:12px;
  border:1px solid transparent;
  background:transparent;
  color:var(--ink-soft);
  font-weight:700;
  cursor:pointer;
  transition:all .2s ease;
}
.plan-pills button.is-active{
  background:linear-gradient(135deg,var(--amber-soft) 0%,var(--amber) 100%);
  color:var(--maroon-deep);
  box-shadow:0 10px 20px rgba(232,146,58,.22);
}
.plan-pills button:disabled{
  opacity:.62;
  cursor:not-allowed;
}
.dashboard-scroll{
  flex:1;
  min-height:0;
  overflow-y:auto;
  overscroll-behavior:contain;
  -webkit-overflow-scrolling:touch;
}
.dashboard-content{
  max-width:1160px;
  margin:0 auto;
  padding:1.35rem 1.5rem 6rem;
}
.status-line{
  min-height:1.4rem;
  margin:0 0 .95rem;
  font-size:.95rem;
  color:var(--ink-soft);
}
.status-line.success{
  color:#2d7b52;
}
.status-line.error{
  color:#bb4357;
}
.stats-row{
  display:grid;
  grid-template-columns:repeat(4,minmax(0,1fr));
  gap:.9rem;
}
.stat-card,
.dashboard-card,
.track-card,
.sheet-row,
.batch-card,
.plan-card{
  background:var(--surface);
  border:1px solid var(--border);
  border-radius:var(--radius-lg);
  box-shadow:var(--shadow);
}
.stat-card{
  padding:1rem 1.05rem;
}
.stat-card strong{
  display:block;
  font-family:"Merriweather",serif;
  font-size:2rem;
  line-height:1;
}
.stat-card span{
  display:block;
  margin-top:.35rem;
  color:var(--ink-soft);
  font-size:.92rem;
}
.dashboard-section{
  margin-top:1.1rem;
}
.section-label{
  margin:0 0 .7rem;
  color:var(--ink-soft);
  font-size:.78rem;
  font-weight:800;
  letter-spacing:.16em;
  text-transform:uppercase;
}
.tag-pill{
  display:inline-flex;
  align-items:center;
  gap:.42rem;
  padding:.38rem .72rem;
  border-radius:999px;
  font-size:.76rem;
  font-weight:700;
}
.tag-pill.amber{
  background:rgba(232,146,58,.2);
  color:#ffd9a9;
}
.tag-pill.pro{
  background:rgba(171,195,255,.16);
  color:#dde8ff;
}
.schedule-map-card{
  background:linear-gradient(135deg,#fdf6ee 0%,#fff9f3 100%);
  border:1.5px solid rgba(232,146,58,.25);
  position:relative;
  overflow:hidden;
}
.schedule-map-trigger{
  display:flex;
  flex-direction:column;
  min-height:220px;
  align-items:flex-start;
  justify-content:space-between;
  text-align:left;
  cursor:pointer;
  color:inherit;
  font:inherit;
  transition:transform .2s ease,box-shadow .2s ease,border-color .2s ease;
}
.schedule-map-trigger:hover{
  transform:translateY(-2px);
  border-color:rgba(232,146,58,.5);
  box-shadow:0 18px 36px rgba(106,31,54,.12);
}
.schedule-map-card::before{
  content:"";
  position:absolute;
  top:-30px;
  right:-30px;
  width:120px;
  height:120px;
  background:radial-gradient(circle,rgba(232,146,58,.12) 0%,transparent 70%);
  pointer-events:none;
}
.schedule-map-card > *{
  position:relative;
  z-index:1;
}
.schedule-tile-icon{
  width:58px;
  height:58px;
  display:flex;
  align-items:center;
  justify-content:center;
  border-radius:18px;
  background:linear-gradient(135deg,rgba(255,219,169,.65),rgba(232,146,58,.95));
  color:var(--maroon-deep);
  font-size:1.65rem;
  box-shadow:0 12px 24px rgba(232,146,58,.22);
}
.schedule-tile-title{
  display:block;
  margin:.9rem 0 .35rem;
  color:var(--maroon);
  font-size:1.35rem;
  font-weight:900;
}
.schedule-tile-meta{
  display:block;
  margin:0;
  color:var(--ink-soft);
}
.schedule-tile-action{
  display:inline-flex;
  align-items:center;
  gap:.45rem;
  color:var(--maroon);
  font-weight:900;
}
.schedule-view{
  position:fixed;
  inset:0;
  z-index:120;
  display:none;
  padding:clamp(.75rem,2vw,1.4rem);
  background:rgba(39,19,29,.46);
  backdrop-filter:blur(10px);
}
.schedule-view.is-open{
  display:block;
}
body.schedule-open{
  overflow:hidden;
}
.schedule-view-panel{
  width:min(1180px,100%);
  max-height:calc(100vh - clamp(1.5rem,4vw,2.8rem));
  margin:0 auto;
  overflow:auto;
  border-radius:30px;
  background:linear-gradient(180deg,#fffaf5 0%,#f8f3ec 100%);
  border:1px solid rgba(106,31,54,.12);
  box-shadow:0 30px 90px rgba(39,19,29,.28);
}
.schedule-view-header{
  position:sticky;
  top:0;
  z-index:3;
  display:flex;
  align-items:center;
  justify-content:space-between;
  gap:1rem;
  padding:1.35rem clamp(1rem,3vw,2rem);
  background:rgba(255,250,245,.92);
  border-bottom:1px solid rgba(106,31,54,.1);
  backdrop-filter:blur(14px);
}
.schedule-view-title h2{
  margin:0;
  color:var(--maroon-deep);
  font-family:Georgia,serif;
  font-size:clamp(1.8rem,3vw,2.65rem);
}
.schedule-view-title p{
  margin:.2rem 0 0;
  color:var(--ink-soft);
}
.schedule-close-btn{
  display:inline-flex;
  align-items:center;
  gap:.45rem;
  border:1px solid rgba(106,31,54,.12);
  border-radius:16px;
  padding:.82rem 1rem;
  background:#fff;
  color:var(--ink);
  font:inherit;
  font-weight:900;
  cursor:pointer;
}
.schedule-view-body{
  padding:clamp(1rem,3vw,2rem);
}
.schedule-date-group + .schedule-date-group{
  margin-top:1.4rem;
}
.schedule-date-title{
  display:flex;
  align-items:center;
  gap:.6rem;
  margin:0 0 .75rem;
  color:var(--maroon);
  font-size:1.15rem;
  font-weight:900;
}
.schedule-date-title::before{
  content:"";
  width:10px;
  height:10px;
  border-radius:50%;
  background:var(--amber);
  box-shadow:0 0 0 5px rgba(232,146,58,.12);
}
.schedule-session-row{
  display:grid;
  grid-template-columns:96px minmax(0,1fr) minmax(220px,.7fr);
  gap:.85rem;
  align-items:center;
  padding:1rem;
  border-radius:20px;
  background:#fff;
  border:1px solid rgba(106,31,54,.1);
  box-shadow:0 14px 32px rgba(106,31,54,.07);
}
.schedule-session-row + .schedule-session-row{
  margin-top:.7rem;
}
.plan-badge-pill{
  display:inline-flex;
  align-items:center;
  justify-content:center;
  width:max-content;
  min-width:78px;
  padding:.38rem .7rem;
  border-radius:999px;
  font-size:.78rem;
  font-weight:900;
}
.plan-badge-pill.free{
  color:#2f7d4a;
  background:rgba(47,125,74,.13);
  border:1px solid rgba(47,125,74,.2);
}
.plan-badge-pill.basic{
  color:#315fb5;
  background:rgba(49,95,181,.13);
  border:1px solid rgba(49,95,181,.2);
}
.plan-badge-pill.pro{
  color:#6f3fa4;
  background:rgba(111,63,164,.14);
  border:1px solid rgba(111,63,164,.22);
}
.schedule-session-main strong{
  display:block;
  color:var(--ink);
  font-size:1rem;
}
.schedule-session-main span{
  display:block;
  margin-top:.18rem;
  color:var(--ink-soft);
  font-size:.9rem;
}
.schedule-topic-tags{
  display:flex;
  flex-wrap:wrap;
  gap:.4rem;
  justify-content:flex-end;
}
.schedule-topic-tags span{
  display:inline-flex;
  padding:.26rem .5rem;
  border-radius:999px;
  background:rgba(232,146,58,.12);
  color:var(--maroon);
  font-size:.76rem;
  font-weight:800;
}
.cta-outline,
.cta-solid,
.track-btn,
.sheet-btn,
.section-btn{
  display:inline-flex;
  align-items:center;
  justify-content:center;
  gap:.45rem;
  border:none;
  border-radius:14px;
  cursor:pointer;
  font:inherit;
  font-weight:700;
  transition:transform .2s ease,box-shadow .2s ease,opacity .2s ease;
}
.cta-outline:hover:not(:disabled),
.cta-solid:hover:not(:disabled),
.track-btn:hover:not(:disabled),
.sheet-btn:hover:not(:disabled),
.section-btn:hover:not(:disabled){
  transform:translateY(-1px);
}
.cta-outline{
  padding:.9rem 1.18rem;
  background:transparent;
  color:#fff;
  border:1px solid rgba(255,255,255,.2);
}
.cta-solid{
  padding:.82rem 1.05rem;
  background:linear-gradient(135deg,var(--amber-soft) 0%,var(--amber) 100%);
  color:var(--maroon-deep);
  box-shadow:0 10px 18px rgba(232,146,58,.22);
}
.section-btn,
.track-btn,
.sheet-btn{
  padding:.78rem 1rem;
  background:#fbf7f1;
  color:var(--ink);
  border:1px solid rgba(106,31,54,.10);
}
.section-btn:disabled,
.track-btn:disabled,
.sheet-btn:disabled{
  opacity:.58;
  cursor:not-allowed;
  transform:none;
}
.dashboard-card{
  padding:1.15rem 1.2rem;
}
.locked-card{
  position:relative;
  overflow:hidden;
}
.locked-card::after{
  content:"";
  position:absolute;
  inset:0;
  background:linear-gradient(180deg,rgba(250,250,246,.22) 0%,rgba(250,250,246,.84) 48%,rgba(250,250,246,.96) 100%);
  backdrop-filter:blur(3px);
}
.locked-message{
  position:absolute;
  inset:auto 1rem 1rem 1rem;
  z-index:2;
  padding:1rem;
  border-radius:16px;
  background:rgba(255,255,255,.92);
  border:1px solid var(--border);
  display:flex;
  align-items:flex-start;
  gap:.75rem;
}
.locked-message i{
  color:var(--maroon);
  font-size:1.18rem;
}
.locked-message strong{
  display:block;
}
.locked-message span{
  display:block;
  margin-top:.18rem;
  color:var(--ink-soft);
  font-size:.92rem;
}
.live-header{
  display:flex;
  align-items:center;
  justify-content:space-between;
  gap:1rem;
  flex-wrap:wrap;
}
.live-header strong{
  font-size:1.2rem;
}
.live-pill{
  display:inline-flex;
  align-items:center;
  gap:.38rem;
  color:var(--amber);
  font-weight:700;
  font-size:.88rem;
}
.live-link-box{
  margin-top:.95rem;
  padding:.95rem 1rem;
  border-radius:18px;
  background:var(--surface-soft);
  border:1px solid rgba(232,146,58,.15);
  display:flex;
  align-items:center;
  justify-content:space-between;
  gap:1rem;
}
.live-link-copy{
  display:flex;
  align-items:flex-start;
  gap:.7rem;
}
.live-link-copy i{
  margin-top:.14rem;
  color:var(--ink-soft);
}
.live-link-copy strong{
  display:block;
  font-size:1rem;
}
.live-link-copy span,
.live-meta{
  color:var(--ink-soft);
  font-size:.92rem;
}
.track-grid{
  display:grid;
  grid-template-columns:repeat(2,minmax(0,1fr));
  gap:.95rem;
}
.track-card{
  padding:1rem;
}
.track-card small{
  display:block;
  color:var(--ink-soft);
  font-weight:700;
  letter-spacing:.06em;
}
.track-head{
  display:flex;
  align-items:center;
  gap:.65rem;
  margin:.72rem 0 .4rem;
}
.track-head i{
  color:var(--maroon);
  font-size:1.1rem;
}
.track-head h3{
  margin:0;
  font-size:1.22rem;
}
.track-card p{
  margin:0;
  color:var(--ink-soft);
  font-size:.93rem;
}
.track-progress{
  margin-top:.95rem;
}
.track-progress-line{
  height:7px;
  border-radius:999px;
  background:#eee6dc;
  overflow:hidden;
  margin-top:.36rem;
}
.track-progress-line span{
  display:block;
  width:0;
  height:100%;
  background:linear-gradient(90deg,var(--maroon) 0%,var(--amber) 100%);
}
.track-footer{
  display:flex;
  align-items:center;
  justify-content:space-between;
  gap:1rem;
  margin-top:.95rem;
}
.track-tag{
  display:inline-flex;
  align-items:center;
  gap:.35rem;
  padding:.34rem .62rem;
  border-radius:999px;
  background:var(--surface-muted);
  color:var(--none-text);
  font-size:.76rem;
  font-weight:700;
}
.track-tag.pro{
  background:rgba(171,195,255,.18);
  color:var(--pro-text);
}
.batch-grid{
  display:grid;
  gap:.95rem;
}
.batch-grid.pro{
  grid-template-columns:repeat(2,minmax(0,1fr));
}
.batch-card{
  padding:1rem;
}
.batch-card strong{
  display:block;
  font-size:1.08rem;
}
.batch-card p{
  margin:.35rem 0 .7rem;
  color:var(--ink-soft);
}
.batch-card span{
  color:var(--ink-soft);
  font-size:.92rem;
}
.sheet-list{
  display:grid;
  gap:.68rem;
}
.sheet-row{
  padding:.88rem .95rem;
  display:flex;
  align-items:center;
  justify-content:space-between;
  gap:1rem;
}
.sheet-info{
  display:flex;
  align-items:center;
  gap:.72rem;
  min-width:0;
}
.sheet-info > div:last-child{
  min-width:0;
}
.sheet-icon{
  width:38px;
  height:38px;
  border-radius:12px;
  display:grid;
  place-items:center;
  background:var(--amber-tint);
  color:var(--amber);
  font-size:1rem;
  flex-shrink:0;
}
.sheet-info strong{
  display:block;
  line-height:1.25;
}
.sheet-info span{
  display:block;
  margin-top:.14rem;
  color:var(--ink-soft);
  font-size:.9rem;
}
.sheet-btn.pro-only{
  color:var(--none-text);
  background:var(--surface-muted);
}
.subject-sheet-grid{
  display:grid;
  gap:1rem;
}
.subject-sheet-card{
  padding:1rem;
  border:1px solid var(--border);
  border-radius:18px;
  background:#fff;
}
.subject-sheet-head{
  display:flex;
  align-items:center;
  justify-content:space-between;
  gap:1rem;
  margin-bottom:.9rem;
}
.subject-sheet-title{
  display:flex;
  align-items:center;
  gap:.72rem;
}
.subject-sheet-head strong{
  display:block;
  color:var(--maroon);
  font-size:1.12rem;
}
.subject-sheet-head span{
  display:block;
  margin-top:.15rem;
  color:var(--ink-soft);
  font-size:.9rem;
}
.subject-sheet-icon{

                <p>All interview and maths sessions organised by date.</p>
              </div>
              <button class="schedule-close-btn" type="button" data-action="close-schedule">
                <i class="ti ti-arrow-left"></i>
                Back to dashboard
              </button>

  </div>

  <script>
  (function () {
    const apiBase = (window.IMBA_SITE_CONFIG && window.IMBA_SITE_CONFIG.apiBaseUrl) || "";
    const USER_PLAN_KEY = "userPlan";
    const USER_NAME_KEY = "userName";
    const USER_EMAIL_KEY = "userEmail";
    const FREE_CLASS_LINK_KEY = "freeClassLink";
    const SESSION_TOKEN_KEY = "imbaSessionToken";
    const NAV_ITEMS = [
      { id: "dashboard", label: "Dashboard", icon: "layout-dashboard", target: "section-dashboard" },
      { id: "recordings", label: "Recordings", icon: "video", target: "section-recordings" },
      { id: "sheets", label: "Sheets", icon: "files", target: "section-sheets" },
      { id: "quiz", label: "Quiz", icon: "help-square-rounded", target: "section-quiz" },
      { id: "articles", label: "Articles", icon: "news", target: "articles", href: "./articles.html" },
      { id: "profile", label: "Profile", icon: "user-circle", target: "section-profile" }
    ];

    const statusNode = document.getElementById("dashboard-status");
    const studentSummaryNode = document.getElementById("student-summary");
    const sidebarNavNode = document.getElementById("sidebar-nav");
    const mobileNavNode = document.getElementById("mobile-nav");
    const topbarCopyNode = document.getElementById("topbar-copy");
    const planPillsNode = document.getElementById("plan-pills");
    const statsRowNode = document.getElementById("stats-row");
    const sectionsRoot = document.getElementById("sections-root");
    const logoutButton = document.getElementById("logout-btn");
    const scheduleView = document.getElementById("schedule-view");
    const scheduleViewBody = document.getElementById("schedule-view-body");

    let currentUser = null;
    let currentPlan = "none";
    let currentConfig = null;
    let interviewDateBoard = {
      ownResponse: null,
      responses: []
    };

    const SESSION_SCHEDULE = [
      { date: "27 May, Wednesday", plan: "basic", title: "Interview Session 1: Structuring Bulletproof Answers", time: "6–7 PM", topics: ["Answer structure", "Interview basics"] },
      { date: "27 May, Wednesday", plan: "pro", title: "Pro (Maths): Set, Relation and Functions", time: "5–7 PM", topics: ["Set", "Relation Functions"], link: "https://meet.google.com/hip-zqmz-aij" },
      { date: "28 May, Thursday", plan: "pro", title: "Maths Lecture 2", time: "5–6:45 PM", topics: ["Trigo", "Inverse trigonometry"] },
      { date: "29 May, Friday", plan: "basic", title: "VA Session 1: Eliminating Fillers & Commanding Presence", time: "8–9:30 PM", topics: ["Presence", "Fillers"], mentor: "Palash Parida", link: "https://meet.google.com/joo-chyn-joq" },
      { date: "29 May, Friday", plan: "pro", title: "Quadratic Session", time: "5 PM", topics: ["Quadratic Equations", "Complex Numbers"], mentor: "Raghvi Mishra", link: "https://meet.google.com/htv-cpus-deh" },
      { date: "30 May, Saturday", plan: "pro", title: "Maths Lecture 4", time: "5–6:45 PM", topics: ["Limit", "Continuity", "Differentiability"] },
      { date: "31 May, Sunday", plan: "pro", title: "Important interview questions and structuring their answer", time: "8–10 PM", topics: ["Interview questions", "Answer structuring"], mentor: "Palash Parida", duration: "2 hours", link: "https://meet.google.com/tei-fxgy-jrw" },
      { date: "31 May, Sunday", plan: "pro", title: "Integration+Area Under curve", time: "5–6:30 PM", topics: ["Integration", "Area under curve"], mentor: "Raghvi Mishra", duration: "1 hr 30 min", link: "https://meet.google.com/vqv-kyww-oxq" },
      { date: "1 June, Monday", plan: "pro", title: "PnC and Binomial", time: "5–6:30 PM", topics: ["Permutation & Combination", "Binomial"], mentor: "Raghvi Mishra", duration: "1.5 hours", link: "https://meet.google.com/zvs-ihxz-ynh" },
      { date: "2 June, Tuesday", plan: "pro", title: "VA Session 2: Navigating Stress Panels & Current Trends", time: "8–9 PM", topics: ["Stress panels", "Current trends"] },
      { date: "2 June, Tuesday", plan: "pro", title: "Maths Lecture 7", time: "5–6:45 PM", topics: ["Matrix and Determinants"] },
      { date: "3 June, Wednesday", plan: "pro", title: "Maths Lecture 8", time: "5–6:45 PM", topics: ["Probability"] },
      { date: "1 June, Monday", plan: "pro", title: "The Final Simulation: Live Mock Panel & Individual Diagnostic", time: "8–10 PM", topics: ["Mock panel", "Diagnostic"], mentor: "Palash Parida", duration: "2 hours", link: "https://meet.google.com/kfd-bmht-wsi" }
    ];
    const SESSION_YEAR = 2026;
    const SESSION_MONTHS = {
      january: 0,
      february: 1,
      march: 2,
      april: 3,
      may: 4,
      june: 5,
      july: 6,
      august: 7,
      september: 8,
      october: 9,
      november: 10,
      december: 11
    };

    function setStatus(message, type) {
      statusNode.textContent = message || "";
      statusNode.className = "status-line" + (type ? " " + type : "");
    }

    function escapeHtml(value) {
      return String(value || "")
        .replace(/&/g, "&amp;")
        .replace(/</g, "&lt;")
        .replace(/>/g, "&gt;")
        .replace(/"/g, "&quot;")
        .replace(/'/g, "&#39;");
    }

    function formatInterviewDate(value) {
      if (!value) return "Date not set";
      const parsedDate = new Date(`${value}T00:00:00`);
      if (Number.isNaN(parsedDate.getTime())) return value;
      return parsedDate.toLocaleDateString("en-IN", {
        day: "numeric",
        month: "short",
        year: "numeric",
        weekday: "short"
      });
    }

    function getPlanLabel(plan) {
      const labels = { free: "Free", basic: "Basic", pro: "Pro" };
      return labels[plan] || "Free";
    }

    function canAccessSession(session, plan) {
      if (!session || session.plan === "free") return true;
      if (session.plan === "basic") return plan === "basic" || plan === "pro";
      if (session.plan === "pro") return plan === "pro";
      return false;
    }

    function getSessionDate(session) {
      const match = String(session?.date || "").match(/^(\d{1,2})\s+([A-Za-z]+)/);
      if (!match) return null;
      const monthIndex = SESSION_MONTHS[match[2].toLowerCase()];
      if (monthIndex === undefined) return null;
      return new Date(SESSION_YEAR, monthIndex, Number(match[1]));
    }

    function isUpcomingSession(session) {
      const sessionDate = getSessionDate(session);
      if (!sessionDate) return true;
      const today = new Date();
      today.setHours(0, 0, 0, 0);
      return sessionDate.getTime() >= today.getTime();
    }

    function getNextVisibleSession(plan) {
      const upcomingSessions = SESSION_SCHEDULE.filter(function (session) {
        return canAccessSession(session, plan) && isUpcomingSession(session);
      });
      return upcomingSessions.find(function (session) {
        return session.link;
      }) || upcomingSessions[0] || null;
    }

    function renderScheduleView() {
      const grouped = SESSION_SCHEDULE.reduce(function (groups, session) {
        if (!groups[session.date]) {
          groups[session.date] = [];
        }
        groups[session.date].push(session);
        return groups;
      }, {});

      scheduleViewBody.innerHTML = Object.keys(grouped).map(function (date) {
        return `
          <section class="schedule-date-group">
            <h3 class="schedule-date-title">${escapeHtml(date)}</h3>
            ${grouped[date].map(function (session) {
              const topics = (session.topics || []).map(function (topic) {
                return `<span>${escapeHtml(topic)}</span>`;
              }).join("");
              const canJoin = canAccessSession(session, currentPlan) && session.link;

              return `
                <article class="schedule-session-row">
                  <span class="plan-badge-pill ${escapeHtml(session.plan)}">${escapeHtml(getPlanLabel(session.plan))}</span>
                  <div class="schedule-session-main">
                    <strong>${escapeHtml(session.title)}</strong>
                    <span>${escapeHtml(session.time)}${session.mentor ? " · Mentor: " + escapeHtml(session.mentor) : ""}</span>
                  </div>
                  <div class="schedule-topic-tags">${topics}</div>
                  ${canJoin ? `<button class="section-btn" type="button" data-open-link="${escapeHtml(session.link)}">Join</button>` : ""}
                </article>
              `;
            }).join("")}
          </section>
        `;
      }).join("");
    }

    function openScheduleView() {
      renderScheduleView();
      scheduleView.classList.add("is-open");
      scheduleView.setAttribute("aria-hidden", "false");
      document.body.classList.add("schedule-open");
      const closeButton = scheduleView.querySelector("[data-action='close-schedule']");
      if (closeButton) {
        closeButton.focus();
      }
    }

    function closeScheduleView() {
      scheduleView.classList.remove("is-open");
      scheduleView.setAttribute("aria-hidden", "true");
      document.body.classList.remove("schedule-open");
    }

    function getInterviewDateModal() {
      return document.getElementById("interview-date-modal");
    }

    function openInterviewDateModal() {
      const modal = getInterviewDateModal();
      if (!modal) return;
      modal.classList.add("is-open");
      modal.setAttribute("aria-hidden", "false");
      const firstField = modal.querySelector("input, textarea, button");
      if (firstField) {
        firstField.focus();
      }
    }

    function closeInterviewDateModal() {
      const modal = getInterviewDateModal();
      if (!modal) return;
      modal.classList.remove("is-open");
      modal.setAttribute("aria-hidden", "true");
    }

    function normalizeCouponCode(value) {
      return String(value || "").trim().toUpperCase().replace(/\s+/g, "");
    }

    function normalizePlan(value) {
      return value === "basic" || value === "pro" || value === "none" ? value : "none";
    }

    function inferPlanFromUser(user) {
      const planId = user && user.courseAccess && user.courseAccess.purchased
        ? normalizePlan(user.courseAccess.planId)
        : "none";
      return planId === "basic" || planId === "pro" ? planId : "none";
    }

    function formatPrice(paise) {
      const amount = Number(paise || 0) / 100;
      return new Intl.NumberFormat("en-IN", {
        style: "currency",
        currency: "INR",
        maximumFractionDigits: 0
      }).format(amount);
    }

    function getDashboardCouponCode() {
      const couponInput = document.getElementById("dashboard-coupon-code");
      return normalizeCouponCode(couponInput ? couponInput.value : "");

    function getCouponActionButton() {
      return document.querySelector("[data-action='apply-coupon']");

    function setCouponFeedback(message, type) {
      const feedbackNode = document.getElementById("dashboard-coupon-feedback");
      if (!feedbackNode) return;
      feedbackNode.textContent = message || "";
      feedbackNode.className = "coupon-feedback" + (type ? " " + type : "");

    function syncCouponButtonState(applied) {
      const couponButton = getCouponActionButton();
      if (!couponButton) return;
      couponButton.classList.toggle("is-applied", Boolean(applied));
      couponButton.textContent = applied ? "Applied" : "Apply";
    }

    async function applyCouponCode(triggerButton) {
      const couponCode = getDashboardCouponCode();
      if (!couponCode) {
        syncCouponButtonState(false);
        setCouponFeedback("Enter a coupon code first.", "error");
        return;
      }

      const originalLabel = triggerButton.textContent;
      triggerButton.disabled = true;
      triggerButton.textContent = "Checking...";

      try {
        const response = await fetch(`${apiBase}/api/apply-coupon`, {
          method: "POST",
          credentials: "include",
          headers: getAuthHeaders({
            "Content-Type": "application/json"
          }),
          body: JSON.stringify({
            planId: "pro",
            code: couponCode
          })
        });

        const payload = await response.json();
        if (!response.ok || !payload.valid) {
          syncCouponButtonState(false);
          setCouponFeedback(payload.message || "This coupon could not be applied.", "error");
          return;
        }

        syncCouponButtonState(true);
        setCouponFeedback("Coupon applied. Choose Pro to use the 10% discount.", "success");
      } catch (error) {
        syncCouponButtonState(false);
        setCouponFeedback("Unable to validate the coupon right now.", "error");
      } finally {
        triggerButton.disabled = false;
        if (!triggerButton.classList.contains("is-applied")) {
          triggerButton.textContent = originalLabel;
        }
      }
    }

    function getStudentState(user) {
      const sessionEmail = (user && user.email) || "";
      const sessionName = (user && user.name) || "Student";
      const storedEmail = localStorage.getItem(USER_EMAIL_KEY) || "";

      if (sessionEmail && storedEmail && storedEmail.toLowerCase() !== sessionEmail.toLowerCase()) {
        localStorage.setItem(USER_NAME_KEY, sessionName);
        localStorage.setItem(USER_EMAIL_KEY, sessionEmail);
        localStorage.setItem(USER_PLAN_KEY, inferPlanFromUser(user));
      } else {
        localStorage.setItem(USER_NAME_KEY, localStorage.getItem(USER_NAME_KEY) || sessionName);
        localStorage.setItem(USER_EMAIL_KEY, localStorage.getItem(USER_EMAIL_KEY) || sessionEmail);
        const storedPlan = localStorage.getItem(USER_PLAN_KEY);
        if (!storedPlan) {
          localStorage.setItem(USER_PLAN_KEY, inferPlanFromUser(user));
        } else if (normalizePlan(storedPlan) === "none" && inferPlanFromUser(user) !== "none") {
          localStorage.setItem(USER_PLAN_KEY, inferPlanFromUser(user));
        }
      }

      const name = localStorage.getItem(USER_NAME_KEY) || sessionName;
      const email = localStorage.getItem(USER_EMAIL_KEY) || sessionEmail || "student@example.com";
      const initials = (name || "IB")
        .split(" ")
        .filter(Boolean)
        .slice(0, 2)
        .map(function (part) { return part.charAt(0).toUpperCase(); })
        .join("") || "IB";
      const plan = normalizePlan(localStorage.getItem(USER_PLAN_KEY));
      const phone = user && user.phone ? user.phone : "Not provided";
      const percentile = user && user.schoolPercentile !== undefined && user.schoolPercentile !== null && user.schoolPercentile !== ""
        ? String(user.schoolPercentile)
        : "Not provided";
      const category = user && user.category ? user.category : "Not provided";

      return {

        initials: initials,
        plan: plan,

    async function fetchSession() {

        throw new Error("Unable to read session.");
      }
      const data = await response.json();
      return data.user || null;
    }

    async function fetchConfig() {
      const response = await fetch(`${apiBase}/api/config`, { credentials: "include" });
      if (!response.ok) {
        throw new Error("Unable to load dashboard configuration.");
      }
      return response.json();
    }

    async function fetchInterviewDates() {
      const response = await fetch(`${apiBase}/api/interview-dates`, {
        credentials: "include",
        headers: getAuthHeaders()
      });
      if (!response.ok) {
        throw new Error("Unable to load interview date responses.");
      }
      const payload = await response.json();
      return {
        ownResponse: payload.ownResponse || null,
        responses: Array.isArray(payload.responses) ? payload.responses : []
      };
    }

    function getAuthHeaders(extraHeaders = {}) {
      const sessionToken = localStorage.getItem(SESSION_TOKEN_KEY);
      return sessionToken
        ? { ...extraHeaders, Authorization: `Bearer ${sessionToken}` }
        : extraHeaders;
    }

    function getFilenameFromDisposition(disposition, fallbackName) {
      const safeFallback = fallbackName || "imba-beacon-file";
      const filenameMatch = String(disposition || "").match(/filename\*?=(?:UTF-8''|")?([^";]+)/i);
      if (!filenameMatch) return safeFallback;

      try {
        return decodeURIComponent(filenameMatch[1].replace(/"/g, "").trim()) || safeFallback;
      } catch (error) {
        return filenameMatch[1].replace(/"/g, "").trim() || safeFallback;
      }
    }

    async function openProtectedContentLink(link) {
      const href = link.getAttribute("href");
      if (!href) return;

      const action = link.getAttribute("data-protected-action") || "view";
      const shouldDownload = action === "download";
      const previewWindow = shouldDownload ? null : window.open("", "_blank");

      try {
        setStatus("Opening protected material...", "success");
        const response = await fetch(href, {
          credentials: "include",
          headers: getAuthHeaders()
        });

        if (response.redirected && response.url.indexOf("login.html") !== -1) {
          if (previewWindow) previewWindow.close();
          window.location.href = response.url;
          return;
        }

        const contentType = response.headers.get("content-type") || "";
        if (!response.ok) {
          if (previewWindow) {
            previewWindow.document.open();
            previewWindow.document.write(contentType.includes("text/html") ? await response.text() : "<p>Unable to open this protected material.</p>");
            previewWindow.document.close();
          }
          throw new Error(response.status === 403 ? "This material is not available for your current plan." : "Unable to open this protected material.");
        }

        const blob = await response.blob();
        const objectUrl = URL.createObjectURL(blob);

        if (shouldDownload) {
          const disposition = response.headers.get("content-disposition") || "";
          const downloadLink = document.createElement("a");
          downloadLink.href = objectUrl;
          downloadLink.download = getFilenameFromDisposition(disposition, "imba-beacon-material");
          document.body.appendChild(downloadLink);
          downloadLink.click();
          downloadLink.remove();
        } else if (previewWindow) {
          previewWindow.location.href = objectUrl;
        } else {
          window.open(objectUrl, "_blank", "noopener,noreferrer");
        }

        window.setTimeout(function () {
          URL.revokeObjectURL(objectUrl);
        }, 60000);
      } catch (error) {
        if (previewWindow && previewWindow.location.href === "about:blank") previewWindow.close();
        setStatus(error.message || "Unable to open this protected material.", "error");
      }
    }

    async function logout() {
      try {
        const response = await fetch(`${apiBase}/api/auth/logout`, {
          method: "POST",
          credentials: "include",
          headers: getAuthHeaders()
        });
        if (!response.ok) {
          throw new Error("Logout failed.");
        }

        localStorage.removeItem(USER_PLAN_KEY);
        localStorage.removeItem(USER_NAME_KEY);
        localStorage.removeItem(USER_EMAIL_KEY);
        localStorage.removeItem(FREE_CLASS_LINK_KEY);
        localStorage.removeItem(SESSION_TOKEN_KEY);
        window.location.href = "./index.html";
      } catch (error) {
        setStatus(error.message || "Unable to logout right now.", "error");
      }
    }

    async function verifyPayment(planId, paymentDetails) {
      try {
        const response = await fetch(`${apiBase}/api/verify-payment`, {
          method: "POST",
          credentials: "include",
          headers: getAuthHeaders({
            "Content-Type": "application/json"
          }),
          body: JSON.stringify({
            planId: planId,
            razorpay_order_id: paymentDetails.razorpay_order_id,
            razorpay_payment_id: paymentDetails.razorpay_payment_id,
            razorpay_signature: paymentDetails.razorpay_signature
          })
        });

        const payload = await response.json();
        if (!response.ok) {
          setStatus(payload.message || "Payment verification failed.", "error");
          return;
        }

        localStorage.setItem(USER_PLAN_KEY, planId);
        if (payload.user) {
          currentUser = payload.user;
        }

        renderDashboard(getStudentState(currentUser));
        setStatus(payload.message || "Payment verified successfully.", "success");
      } catch (error) {
        setStatus("Payment completed, but verification could not be confirmed.", "error");
      }
    }

    async function startCheckout(planId, triggerButton) {
      const couponCode = getDashboardCouponCode();
      const checkoutCouponCode = planId === "pro" ? couponCode : "";

      if (couponCode && !checkoutCouponCode) {
        syncCouponButtonState(false);
        setCouponFeedback("Coupons apply to Pro only. Basic checkout will continue at regular price.");
      }

      if (!currentUser) {
        const couponParam = checkoutCouponCode ? `&coupon=${encodeURIComponent(checkoutCouponCode)}` : "";
        window.location.href = `./login.html?access=purchase&plan=${encodeURIComponent(planId)}&next=${encodeURIComponent("./student.html")}${couponParam}`;
        return;
      }

      if (currentPlan === planId) {
        setStatus(`${planId === "pro" ? "Pro" : "Basic"} plan is already active on this account.`, "success");
        return;
      }

      if (!currentConfig || !currentConfig.paymentsEnabled) {
        setStatus("Online payments are temporarily disabled right now.", "error");
        return;
      }

      if (!currentConfig.razorpayKeyId || typeof window.Razorpay !== "function") {
        setStatus("Razorpay checkout could not be loaded right now.", "error");
        return;
      }

      const originalText = triggerButton.textContent;
      triggerButton.disabled = true;
      triggerButton.textContent = "Preparing...";

      try {
        const response = await fetch(`${apiBase}/api/create-order`, {
          method: "POST",
          credentials: "include",
          headers: getAuthHeaders({
            "Content-Type": "application/json"
          }),
          body: JSON.stringify({
            planId: planId,
            couponCode: checkoutCouponCode
          })
        });

        const payload = await response.json();
        if (!response.ok) {
          setStatus(payload.message || "Unable to create Razorpay order.", "error");
          return;
        }

        if (payload.coupon && payload.coupon.applied) {
          const planLabel = planId === "pro" ? "Pro" : "Basic";
          setStatus(`Coupon ${payload.coupon.code} applied. Final ${planLabel} checkout is ${payload.coupon.finalAmountDisplay}.`, "success");
        }

        const student = getStudentState(currentUser);
        const razorpay = new window.Razorpay({
          key: currentConfig.razorpayKeyId,
          amount: payload.amount,
          currency: payload.currency,
          name: "IMBA Beacon",
          description: `${planId === "pro" ? "Pro" : "Basic"} plan checkout`,
          order_id: payload.order_id,
          prefill: {
            name: student.name,
            email: student.email,
            contact: currentUser.phone || ""
          },
          theme: {
            color: "#6a1f36"
          },
          modal: {
            ondismiss: function () {
              setStatus("Checkout was closed before payment completion.", "error");
            }
          },
          handler: function (paymentResponse) {
            verifyPayment(planId, paymentResponse);
          }
        });

        razorpay.on("payment.failed", function (event) {
          const description = event && event.error && (event.error.description || event.error.reason) || "Payment failed.";
          setStatus(description, "error");
        });

        razorpay.open();
      } catch (error) {
        setStatus("Unable to initiate Razorpay payment right now.", "error");
      } finally {
        triggerButton.disabled = false;
        triggerButton.textContent = originalText;
      }
    }

    async function submitInterviewDate(form) {
      const submitButton = form.querySelector("button[type='submit']");
      const originalText = submitButton ? submitButton.textContent : "";
      if (submitButton) {
        submitButton.disabled = true;
        submitButton.textContent = "Saving...";
      }

      try {
        const formData = new FormData(form);
        const response = await fetch(`${apiBase}/api/interview-dates`, {
          method: "POST",
          credentials: "include",
          headers: getAuthHeaders({
            "Content-Type": "application/json"
          }),
          body: JSON.stringify({
            interviewDate: formData.get("interviewDate"),
            interviewTime: formData.get("interviewTime"),
            note: formData.get("note")
          })
        });
        const payload = await response.json();

        if (!response.ok) {
          setStatus(payload.message || "Unable to save interview date.", "error");
          return;
        }

        interviewDateBoard = await fetchInterviewDates();
        renderDashboard(getStudentState(currentUser));
        setStatus(payload.message || "Interview date saved.", "success");
        const section = document.getElementById("section-interview-dates");
        if (section) {
          section.scrollIntoView({ behavior: "smooth", block: "start" });
        }
      } catch (error) {
        setStatus(error.message || "Unable to save interview date right now.", "error");
      } finally {
        if (submitButton) {
          submitButton.disabled = false;
          submitButton.textContent = originalText;
        }
      }
    }

    function updateActiveNav(target) {
      document.querySelectorAll("[data-nav-target]").forEach(function (node) {
        const matches = node.getAttribute("data-nav-target") === target;
        node.classList.toggle("is-active", matches);
      });
    }

    function scrollToRequestedSection() {
      const target = decodeURIComponent(window.location.hash || "").replace(/^#/, "");
      if (!target) return;
      window.requestAnimationFrame(function () {
        const section = document.getElementById(target);
        if (section) {
          section.scrollIntoView({ behavior: "smooth", block: "start" });
          updateActiveNav(target);
        }
      });
    }

    function safeOpenLink(link) {
      if (!link) {
        return false;
      }
      const href = /^https?:\/\//i.test(link) ? link : `https://${link}`;
      window.open(href, "_blank", "noopener,noreferrer");
      return true;
    }

    document.addEventListener("click", function (event) {
      const protectedContentLink = event.target.closest(".js-protected-content");
      if (protectedContentLink) {
        event.preventDefault();
        openProtectedContentLink(protectedContentLink);
        return;
      }

      const navButton = event.target.closest("[data-nav-target]");
      if (navButton) {
        const target = navButton.getAttribute("data-nav-target");
        if (target === "logout") {
          logout();
          return;
        }
        const section = document.getElementById(target);
        if (section) {
          event.preventDefault();
          section.scrollIntoView({ behavior: "smooth", block: "start" });
          updateActiveNav(target);
        }
        return;
      }

      const couponButton = event.target.closest("[data-action='apply-coupon']");
      if (couponButton) {
        event.preventDefault();
        applyCouponCode(couponButton);
        return;
      }

      const purchaseButton = event.target.closest("[data-plan-id]");
      if (purchaseButton) {
        event.preventDefault();
        startCheckout(purchaseButton.getAttribute("data-plan-id"), purchaseButton);
        return;
      }

      const linkButton = event.target.closest("[data-open-link]");
      if (linkButton) {
        event.preventDefault();
        if (!safeOpenLink(linkButton.getAttribute("data-open-link"))) {
          setStatus("Live class link is not available yet.", "error");
        }
        return;
      }

      const freeClassButton = event.target.closest("[data-action='join-free-class']");
      if (freeClassButton) {
        event.preventDefault();
        const freeClassLink = (localStorage.getItem(FREE_CLASS_LINK_KEY) || "").trim();
        if (!safeOpenLink(freeClassLink)) {
          setStatus("Free class link will be shared here once the session slot is announced.", "success");
        }
        return;
      }

      const openScheduleButton = event.target.closest("[data-action='open-schedule']");
      if (openScheduleButton) {
        event.preventDefault();
        openScheduleView();
        return;
      }

      const closeScheduleButton = event.target.closest("[data-action='close-schedule']");
      if (closeScheduleButton) {
        event.preventDefault();
        closeScheduleView();
        return;
      }

      if (event.target === scheduleView) {
        closeScheduleView();
        return;
      }

      const openInterviewDateButton = event.target.closest("[data-action='open-interview-date']");
      if (openInterviewDateButton) {
        event.preventDefault();
        openInterviewDateModal();
        return;
      }

      const closeInterviewDateButton = event.target.closest("[data-action='close-interview-date']");
      if (closeInterviewDateButton) {
        event.preventDefault();
        closeInterviewDateModal();
        return;
      }

      const interviewDateModal = getInterviewDateModal();
      if (interviewDateModal && event.target === interviewDateModal) {
        closeInterviewDateModal();
        return;
      }

      const downloadButton = event.target.closest("[data-download-sheet]");
      if (downloadButton) {
        event.preventDefault();
        const title = downloadButton.getAttribute("data-download-sheet") || "Sheet";
        setStatus(`${title} is ready for your PDF attachment. Add the final file when you want downloads live.`, "success");
        return;
      }

      const placeholderButton = event.target.closest("[data-placeholder]");
      if (placeholderButton) {
        event.preventDefault();
        const feature = placeholderButton.getAttribute("data-placeholder");
        const messages = {
          recordings: "Recording hub can be connected here next.",
          quiz: "Quiz module can be connected to this tile next.",
          "mock-interviews": "Interview scheduling can be attached to this button next.",
          verbal: "Interview etiquettes session room can be connected here next.",
          mentoring: "Maths session room can be connected here next."
        };
        setStatus(messages[feature] || "This module can be connected here next.", "success");
      }
    });

    document.addEventListener("keydown", function (event) {
      if (event.key === "Escape" && scheduleView.classList.contains("is-open")) {
        closeScheduleView();
      }
      const interviewDateModal = getInterviewDateModal();
      if (event.key === "Escape" && interviewDateModal && interviewDateModal.classList.contains("is-open")) {
        closeInterviewDateModal();
      }

    document.addEventListener("input", function (event) {

      }

    document.addEventListener("submit", function (event) {

        event.preventDefault();
        submitInterviewDate(interviewDateForm);

        const couponButton = getCouponActionButton();
        if (couponButton) {
          applyCouponCode(couponButton);
        }

    logoutButton.addEventListener("click", logout);

    Promise.all([fetchConfig(), fetchSession()])
      .then(async function (results) {
        currentConfig = results[0];
        currentUser = results[1];

        if (!currentUser) {
          window.location.href = "./login.html?next=./student.html";
          return;
        }

        interviewDateBoard = await fetchInterviewDates();
        renderDashboard(getStudentState(currentUser));
        setStatus("Dashboard loaded successfully.", "success");
        scrollToRequestedSection();
      })
      .catch(function (error) {
        setStatus(error.message || "Unable to load the dashboard.", "error");
      });
  })();
  </script>
</body>
